<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF ファイル名変換ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=Space+Mono:wght@400;700&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --accent: #4f6ef7;
    --accent2: #7c3aed;
    --success: #10b981;
    --warning: #f59e0b;
    --error: #ef4444;
    --text: #e8e8f0;
    --text-muted: #6b6b85;
    --text-dim: #3a3a52;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--text-dim) 1px, transparent 1px),
      linear-gradient(90deg, var(--text-dim) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.12;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 18px 60px;
    position: relative;
    z-index: 1;
  }

  header { margin-bottom: 28px; }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.3em;
    color: var(--accent);
    text-transform: uppercase;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .logo-dot { width:6px;height:6px;background:var(--accent);border-radius:50%;animation:pulse 2s ease-in-out infinite; }
  @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}

  h1 { font-size: 24px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 10px; }
  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }

  .rule-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 5px 10px; background: var(--surface2);
    border: 1px solid var(--border); border-radius: 6px;
    font-size: 11px; font-family: 'Space Mono', monospace; color: var(--text-muted);
  }
  .rule-badge b { color: var(--accent); font-weight: 400; }

  /* API Key section */
  .key-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .key-label { font-size: 11px; font-family:'Space Mono',monospace; color:var(--text-muted); white-space:nowrap; }
  .key-input {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 7px; padding: 8px 11px; font-size: 12px;
    font-family: 'Space Mono', monospace; color: var(--text); outline: none;
    transition: border-color .2s;
  }
  .key-input:focus { border-color: var(--accent); }
  .key-input::placeholder { color: var(--text-dim); }
  .key-badge {
    font-size: 10px; font-family:'Space Mono',monospace;
    padding: 4px 9px; border-radius: 5px; white-space: nowrap; flex-shrink: 0;
  }
  .key-badge.ok { background: rgba(16,185,129,.15); color: var(--success); }
  .key-badge.ng { background: rgba(107,107,133,.15); color: var(--text-muted); }

  /* Drop zone */
  .drop-zone {
    border: 2px dashed var(--border); border-radius: 14px;
    padding: 48px 36px; text-align: center; cursor: pointer;
    transition: all .3s cubic-bezier(.4,0,.2,1);
    background: var(--surface); position: relative; overflow: hidden;
    margin-bottom: 18px;
  }
  .drop-zone::before {
    content:''; position:absolute; inset:0;
    background: radial-gradient(ellipse at 50% 0%, rgba(79,110,247,.08) 0%, transparent 70%);
    opacity:0; transition:opacity .3s;
  }
  .drop-zone.dragging { border-color:var(--accent); background:rgba(79,110,247,.05); transform:scale(1.01); }
  .drop-zone.dragging::before { opacity:1; }

  .drop-icon {
    width:50px; height:50px; margin:0 auto 12px;
    border-radius:12px; background:linear-gradient(135deg,var(--accent),var(--accent2));
    display:flex; align-items:center; justify-content:center; font-size:22px;
    transition:transform .3s;
  }
  .drop-zone.dragging .drop-icon { transform:translateY(-4px) scale(1.1); }
  .drop-title { font-size:15px; font-weight:500; margin-bottom:5px; }
  .drop-sub { font-size:12px; color:var(--text-muted); }
  .drop-sub b { color:var(--accent); font-weight:500; }
  #fileInput { display:none; }

  /* File list */
  .file-list { display:flex; flex-direction:column; gap:9px; margin-bottom:18px; }

  .file-card {
    background:var(--surface); border:1px solid var(--border);
    border-radius:11px; overflow:hidden;
    animation:slideIn .25s cubic-bezier(.4,0,.2,1); transition:border-color .3s;
  }
  @keyframes slideIn{from{opacity:0;transform:translateY(-7px)}to{opacity:1;transform:translateY(0)}}
  .file-card.done { border-color:rgba(16,185,129,.35); }
  .file-card.errored { border-color:rgba(239,68,68,.35); }

  .progress-bar { height:2px; background:var(--border); }
  .progress-fill {
    height:100%; background:linear-gradient(90deg,var(--accent),var(--accent2));
    animation:prog 1.4s ease-in-out infinite;
  }
  @keyframes prog{0%{width:5%}50%{width:75%}100%{width:5%}}

  .file-header { display:flex; align-items:center; gap:10px; padding:12px 14px; }
  .file-icon {
    width:33px; height:33px; background:rgba(239,68,68,.12); border-radius:7px;
    display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0;
  }
  .file-info { flex:1; min-width:0; }
  .file-name { font-size:13px; font-weight:500; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .file-meta { font-size:10px; color:var(--text-muted); font-family:'Space Mono',monospace; margin-top:2px; }

  .status-chip {
    font-family:'Space Mono',monospace; font-size:9px; font-weight:700;
    letter-spacing:.12em; padding:3px 7px; border-radius:4px; flex-shrink:0;
  }
  .s-pending { background:rgba(107,107,133,.2); color:var(--text-muted); }
  .s-reading { background:rgba(245,158,11,.15); color:var(--warning); }
  .s-done { background:rgba(16,185,129,.15); color:var(--success); }
  .s-error { background:rgba(239,68,68,.15); color:var(--error); }

  .btn-x {
    background:none; border:none; color:var(--text-dim); cursor:pointer;
    font-size:18px; line-height:1; padding:2px 4px; border-radius:4px;
    transition:color .2s; flex-shrink:0;
  }
  .btn-x:hover { color:var(--error); }

  .file-result { padding: 0 14px 13px; }

  .fields-grid { display:grid; grid-template-columns:1fr 1fr; gap:7px; margin-bottom:7px; }
  .field { display:flex; flex-direction:column; gap:3px; }
  .field-label { font-size:9px; font-family:'Space Mono',monospace; color:var(--text-muted); letter-spacing:.1em; }
  .field-input {
    background:var(--surface2); border:1px solid var(--border);
    border-radius:6px; padding:6px 9px; font-size:12px;
    font-family:'Noto Sans JP',sans-serif; color:var(--text);
    width:100%; outline:none; transition:border-color .2s;
  }
  .field-input:focus { border-color:var(--accent); }

  .new-name-box {
    background:var(--surface2); border:1px solid rgba(79,110,247,.3);
    border-radius:8px; padding:9px 11px;
  }
  .new-name-label { font-size:9px; font-family:'Space Mono',monospace; color:var(--accent); letter-spacing:.1em; margin-bottom:3px; }
  .new-name-value { font-size:11px; font-family:'Space Mono',monospace; color:var(--text); word-break:break-all; }

  .error-msg {
    font-size:12px; color:var(--error); padding:8px 11px;
    background:rgba(239,68,68,.07); border-radius:6px;
  }
  .reading-msg {
    font-size:12px; color:var(--text-muted);
    display:flex; align-items:center; gap:8px; padding-bottom:12px; padding-top:2px;
  }
  .dots { display:inline-flex; gap:3px; }
  .dots span {
    width:4px; height:4px; background:var(--warning); border-radius:50%;
    animation:dot 1.3s ease-in-out infinite;
  }
  .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
  @keyframes dot{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}

  /* Action bar */
  .action-bar { display:flex; gap:9px; align-items:center; margin-bottom:16px; }
  .btn {
    display:inline-flex; align-items:center; gap:7px; padding:11px 22px;
    border-radius:9px; font-size:13px; font-weight:500;
    font-family:'Noto Sans JP',sans-serif; cursor:pointer; transition:all .2s; border:none;
  }
  .btn-primary { background:linear-gradient(135deg,var(--accent),var(--accent2)); color:#fff; flex:1; }
  .btn-primary:hover:not(:disabled) { opacity:.88; transform:translateY(-1px); }
  .btn-primary:disabled { opacity:.35; cursor:not-allowed; }
  .btn-secondary { background:var(--surface2); border:1px solid var(--border); color:var(--text-muted); }
  .btn-secondary:hover { color:var(--text); border-color:var(--text-muted); }
  .count-chip {
    font-family:'Space Mono',monospace; font-size:10px;
    padding:2px 7px; background:rgba(79,110,247,.2); border-radius:20px; color:var(--accent);
  }

  /* Downloads */
  .dl-section {
    background:var(--surface); border:1px solid rgba(16,185,129,.3);
    border-radius:12px; padding:16px; margin-top:4px;
  }
  .dl-title { font-size:13px; font-weight:500; color:var(--success); margin-bottom:10px; }
  .dl-list { display:flex; flex-direction:column; gap:6px; }
  .dl-item { display:flex; align-items:center; gap:10px; padding:8px 11px; background:var(--surface2); border-radius:7px; }
  .dl-name { flex:1; font-size:11px; font-family:'Space Mono',monospace; color:var(--text); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .btn-dl {
    background:rgba(16,185,129,.12); border:1px solid rgba(16,185,129,.3);
    border-radius:6px; color:var(--success); font-size:12px; padding:5px 12px;
    cursor:pointer; font-family:'Noto Sans JP',sans-serif; font-weight:500;
    transition:all .2s; flex-shrink:0;
  }
  .btn-dl:hover { background:rgba(16,185,129,.22); }
</style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo"><div class="logo-dot"></div>PDF Rename Tool</div>
    <h1>PDF <span>ファイル名</span>変換ツール</h1>
    <div class="rule-badge">命名規則：<b>作成日</b>_<b>支払種別</b>_<b>領収日払込</b>_<b>物件名</b>_<b>場所</b>.pdf</div>
  </header>

  <!-- API Key -->
  <div class="key-section">
    <span class="key-label">API KEY</span>
    <input class="key-input" id="apiKey" type="password" placeholder="sk-ant-api03-xxxx（初回のみ入力）" autocomplete="off">
    <span class="key-badge" id="keyBadge"></span>
  </div>

  <!-- Drop zone -->
  <div class="drop-zone" id="dropZone">
    <div class="drop-icon">📄</div>
    <div class="drop-title">PDFファイルをここにドロップ</div>
    <div class="drop-sub">または <b>クリックして選択</b>（複数同時OK・スキャンPDF対応）</div>
    <input type="file" id="fileInput" accept=".pdf" multiple>
  </div>

  <div class="file-list" id="fileList"></div>

  <div class="action-bar" id="actionBar" style="display:none">
    <button class="btn btn-secondary" id="btnClear">クリア</button>
    <button class="btn btn-primary" id="btnAnalyze" disabled>
      🔍 AIで解析する <span class="count-chip" id="countChip">0</span>
    </button>
  </div>

  <div id="dlSection" style="display:none" class="dl-section">
    <div class="dl-title">✅ 変換完了 — ファイルをダウンロード</div>
    <div class="dl-list" id="dlList"></div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

const files = new Map();
let nextId = 0;

// ── API Key（localStorageに保存） ──────────────────
const apiKeyEl = document.getElementById('apiKey');
const keyBadge = document.getElementById('keyBadge');

// 保存済みキーを復元
const savedKey = localStorage.getItem('anthropic_api_key') || '';
if (savedKey) apiKeyEl.value = savedKey;
updateKeyBadge(savedKey);

function getKey() { return apiKeyEl.value.trim(); }

function updateKeyBadge(key) {
  const ok = key.startsWith('sk-ant');
  keyBadge.textContent = ok ? '✓ 保存済み' : '未入力';
  keyBadge.className = 'key-badge ' + (ok ? 'ok' : 'ng');
}

apiKeyEl.addEventListener('input', () => {
  const key = getKey();
  if (key.startsWith('sk-ant')) {
    localStorage.setItem('anthropic_api_key', key);
  }
  updateKeyBadge(key);
  refreshBtn();
});

// ── Drag & Drop ─────────────────────────────────────
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('click', () => fileInput.click());
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragging'); });
dropZone.addEventListener('dragleave', e => { if (!dropZone.contains(e.relatedTarget)) dropZone.classList.remove('dragging'); });
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragging'); addFiles([...e.dataTransfer.files]); });
fileInput.addEventListener('change', () => { addFiles([...fileInput.files]); fileInput.value = ''; });

function addFiles(list) {
  const pdfs = list.filter(f => f.name.toLowerCase().endsWith('.pdf'));
  if (!pdfs.length) return alert('PDFファイルのみ対応しています');
  pdfs.forEach(f => {
    const id = ++nextId;
    files.set(id, { file: f, status: 'pending', data: null });
    renderCard(id);
  });
  refreshUI();
}

// ── Render ─────────────────────────────────────────
function renderCard(id) {
  const entry = files.get(id);
  if (!entry) return;
  const { file, status, data } = entry;

  let card = document.getElementById(`c${id}`);
  if (!card) {
    card = document.createElement('div');
    card.id = `c${id}`;
    document.getElementById('fileList').appendChild(card);
  }

  const chipMap = {
    pending: ['s-pending','PENDING'],
    reading: ['s-reading','READING'],
    done:    ['s-done',   'DONE'],
    error:   ['s-error',  'ERROR'],
  };
  const [cls, lbl] = chipMap[status] || chipMap.pending;

  let extra = '';
  if (status === 'reading') {
    extra = `<div class="progress-bar"><div class="progress-fill"></div></div>
      <div class="file-result"><div class="reading-msg">AIが解析中（スキャンPDFは少し時間がかかります）<div class="dots"><span></span><span></span><span></span></div></div></div>`;
  } else if (status === 'done' && data) {
    extra = `<div class="file-result">
      <div class="fields-grid">
        <div class="field"><div class="field-label">日付（ファイル作成日・自動）</div><input class="field-input" id="d${id}" value="${esc(data.fileDate)}" placeholder="YYYYMMDD" oninput="upd(${id})"></div>
        <div class="field"><div class="field-label">支払種別</div><input class="field-input" id="p${id}" value="${esc(data.utilityType)}" placeholder="電気料金 / 水道料金 / ガス料金" oninput="upd(${id})"></div>
        <div class="field"><div class="field-label">領収日払込（例: 0220払込）</div><input class="field-input" id="s${id}" value="${esc(data.receiptStamp)}" placeholder="MMDD払込 または 未記入払込" oninput="upd(${id})"></div>
        <div class="field"><div class="field-label">物件名</div><input class="field-input" id="n${id}" value="${esc(data.property)}" oninput="upd(${id})"></div>
      </div>
      <div class="field" style="margin-bottom:8px">
        <div class="field-label">場所</div>
        <input class="field-input" id="l${id}" value="${esc(data.location)}" oninput="upd(${id})">
      </div>
      <div class="new-name-box">
        <div class="new-name-label">→ 新しいファイル名</div>
        <div class="new-name-value" id="nn${id}">${esc(mkName(data))}</div>
      </div>
    </div>`;
  } else if (status === 'error' && data) {
    extra = `<div class="file-result"><div class="error-msg">⚠️ ${esc(data.error)}</div></div>`;
  }

  card.className = `file-card${status==='done'?' done':status==='error'?' errored':''}`;
  card.innerHTML = `
    <div class="file-header">
      <div class="file-icon">📑</div>
      <div class="file-info">
        <div class="file-name">${esc(file.name)}</div>
        <div class="file-meta">${fmt(file.size)}</div>
      </div>
      <span class="status-chip ${cls}">${lbl}</span>
      <button class="btn-x" onclick="rm(${id})">×</button>
    </div>${extra}`;
}

function upd(id) {
  const el = document.getElementById(`nn${id}`);
  if (el) el.textContent = mkName(getFields(id));
}
function getFields(id) {
  return {
    fileDate:     document.getElementById(`d${id}`)?.value ?? '',
    utilityType:  document.getElementById(`p${id}`)?.value ?? '',
    receiptStamp: document.getElementById(`s${id}`)?.value ?? '',
    property:     document.getElementById(`n${id}`)?.value ?? '',
    location:     document.getElementById(`l${id}`)?.value ?? '',
  };
}
function mkName(d) {
  const s = v => (String(v||'').trim().replace(/[\\/:*?"<>|\r\n]/g,'_')||'不明');
  return `${s(d.fileDate)}_${s(d.utilityType)}_${s(d.receiptStamp)}_${s(d.property)}_${s(d.location)}.pdf`;
}
function rm(id) {
  document.getElementById(`c${id}`)?.remove();
  files.delete(id);
  refreshUI();
  if (!files.size) document.getElementById('dlSection').style.display = 'none';
}

// ── UI ─────────────────────────────────────────────
function refreshUI() {
  const bar = document.getElementById('actionBar');
  bar.style.display = files.size ? 'flex' : 'none';
  document.getElementById('countChip').textContent = files.size;
  refreshBtn();
}
function refreshBtn() {
  const hasPending = [...files.values()].some(e => e.status === 'pending');
  const hasKey = getKey().startsWith('sk-ant');
  document.getElementById('btnAnalyze').disabled = !(hasPending && hasKey);
}

document.getElementById('btnClear').addEventListener('click', () => {
  files.clear();
  document.getElementById('fileList').innerHTML = '';
  document.getElementById('dlSection').style.display = 'none';
  refreshUI();
});

// ── PDF → text ─────────────────────────────────────
async function pdfToText(file) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  let out = '';
  for (let i = 1; i <= Math.min(pdf.numPages, 3); i++) {
    const page = await pdf.getPage(i);
    const tc = await page.getTextContent();
    out += tc.items.map(x => x.str).join(' ') + '\n';
  }
  return out.trim();
}

// ── PDF → images (for scanned) ──────────────────────
async function pdfToImages(file, maxPages = 2) {
  const ab = await file.arrayBuffer();
  const pdf = await pdfjsLib.getDocument({ data: ab }).promise;
  const out = [];
  const n = Math.min(pdf.numPages, maxPages);
  for (let i = 1; i <= n; i++) {
    const page = await pdf.getPage(i);
    const vp = page.getViewport({ scale: 1.6 });
    const canvas = document.createElement('canvas');
    canvas.width = vp.width;
    canvas.height = vp.height;
    await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
    out.push(canvas.toDataURL('image/jpeg', 0.80).split(',')[1]);
  }
  return out;
}

// ── Claude API ─────────────────────────────────────
// 今日の日付を YYYYMMDD で取得
function todayStr() {
  const d = new Date();
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,'0');
  const day = String(d.getDate()).padStart(2,'0');
  return `${y}${m}${day}`;
}

const PROMPT = `この払込票・領収書の画像またはテキストから以下の情報を抽出してください。

1. utilityType: 支払種別。払込票に記載された料金の種類を「電気料金」「水道料金」「ガス料金」のいずれかで答えること。判断できない場合は「不明」。

2. receiptStamp: 領収日付印の日付を読み取る。
   - 電気料金の場合：「日附印」と書かれた枠内のスタンプ・印鑑の日付を読み取る
   - 水道料金の場合：「領収日付印」と書かれた枠内のスタンプ・印鑑の日付を読み取る
   - ガス料金の場合：領収印・収納印・日付印などのスタンプの日付を読み取る
   - 日付が読み取れた場合：月と日のみを「MMDD払込」形式で返す（例：1月19日→「0119払込」、2月20日→「0220払込」）
   - 枠内にスタンプ・印鑑がない、空欄、または日付が読み取れない場合：「未記入払込」を返す

3. property: 物件名（マンション名・建物名など）。見つからなければ空文字。
4. location: 場所（部屋番号・住所・エリアなど）。見つからなければ空文字。

JSONのみ返すこと（説明・バッククォート不要）:
{"utilityType":"","receiptStamp":"","property":"","location":""}`;

async function callClaude(content) {
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': getKey(),
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: 'claude-opus-4-5',
      max_tokens: 512,
      messages: [{ role: 'user', content }],
    }),
  });

  const json = await res.json();

  if (!res.ok) {
    const msg = json?.error?.message || `HTTP ${res.status}`;
    throw new Error(msg);
  }

  const raw = (json.content || []).filter(b => b.type === 'text').map(b => b.text).join('');
  const m = raw.match(/\{[\s\S]*?\}/);
  if (!m) throw new Error('JSONを取得できませんでした: ' + raw.slice(0, 120));
  return JSON.parse(m[0]);
}

async function analyze(file) {
  const text = await pdfToText(file);
  let aiData;

  if (text.length > 30) {
    aiData = await callClaude([{ type: 'text', text: PROMPT + '\n\nPDFテキスト:\n' + text.slice(0, 5000) }]);
  } else {
    const imgs = await pdfToImages(file, 2);
    aiData = await callClaude([
      { type: 'text', text: PROMPT + '\n\n以下はスキャンPDFの画像です。' },
      ...imgs.map(b64 => ({ type: 'image', source: { type: 'base64', media_type: 'image/jpeg', data: b64 } }))
    ]);
  }

  return {
    fileDate:     todayStr(),                          // 今日の日付（自動）
    utilityType:  aiData.utilityType  || '不明',
    receiptStamp: aiData.receiptStamp || '未記入払込',
    property:     aiData.property     || '',
    location:     aiData.location     || '',
  };
}

// ── Analyze click ──────────────────────────────────
document.getElementById('btnAnalyze').addEventListener('click', async () => {
  document.getElementById('btnAnalyze').disabled = true;

  const pending = [...files.entries()].filter(([, v]) => v.status === 'pending');
  for (const [id, entry] of pending) {
    entry.status = 'reading';
    renderCard(id);
    try {
      entry.data = await analyze(entry.file);
      entry.status = 'done';
    } catch (e) {
      entry.status = 'error';
      entry.data = { error: e.message || String(e) };
    }
    renderCard(id);
  }

  refreshUI();
  renderDL();
});

// ── Downloads ──────────────────────────────────────
function renderDL() {
  const done = [...files.entries()].filter(([, v]) => v.status === 'done');
  if (!done.length) return;

  const sec = document.getElementById('dlSection');
  const list = document.getElementById('dlList');
  sec.style.display = 'block';
  list.innerHTML = '';

  done.forEach(([id, entry]) => {
    const row = document.createElement('div');
    row.className = 'dl-item';
    row.innerHTML = `<div class="dl-name">${esc(mkName(entry.data))}</div><button class="btn-dl" data-id="${id}">⬇ DL</button>`;
    list.appendChild(row);

    row.querySelector('.btn-dl').addEventListener('click', () => {
      const f = getFields(id);
      const name = mkName({
        fileDate:     f.fileDate     || entry.data.fileDate,
        utilityType:  f.utilityType  || entry.data.utilityType,
        receiptStamp: f.receiptStamp || entry.data.receiptStamp,
        property:     f.property     || entry.data.property,
        location:     f.location     || entry.data.location,
      });
      const url = URL.createObjectURL(entry.file);
      const a = Object.assign(document.createElement('a'), { href: url, download: name });
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 8000);
    });
  });
}

// ── Utils ──────────────────────────────────────────
function esc(s) {
  return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function fmt(n) {
  if (n < 1024) return n + ' B';
  if (n < 1048576) return (n/1024).toFixed(1) + ' KB';
  return (n/1048576).toFixed(1) + ' MB';
}
