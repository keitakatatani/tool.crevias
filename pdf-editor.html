<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #fff8f8;
    --surface: #ffffff;
    --surface2: #fdf3f3;
    --border: #f0dede;
    --border2: #f7ecec;
    --accent: #e05a7a;
    --accent2: #f0956a;
    --accent-light: rgba(224,90,122,.08);
    --success: #2baa72;
    --warning: #e8972a;
    --error: #e04040;
    --text: #2a1f2a;
    --text-muted: #9a8090;
    --text-dim: #d0c0c8;
    --shadow: rgba(224,90,122,.10);
    --shadow2: rgba(224,90,122,.06);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(224,90,122,.06) 0%, transparent 50%),
      radial-gradient(circle at 85% 80%, rgba(240,149,106,.06) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }

  .container { max-width: 960px; margin: 0 auto; padding: 24px 20px 60px; position: relative; z-index: 1; }

  /* ── Header ── */
  header { margin-bottom: 20px; }
  .header-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; }

  .logo {
    font-family: 'DM Mono', monospace; font-size: 10px; font-weight: 500;
    letter-spacing: .3em; color: var(--accent); text-transform: uppercase;
    margin-bottom: 10px; display: flex; align-items: center; gap: 8px;
  }
  .logo-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.7)} }

  h1 { font-size: 22px; font-weight: 700; letter-spacing: -.02em; margin-bottom: 4px; }
  h1 span {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 10px; letter-spacing: .02em; }
  .subtitle span { color: var(--accent2); font-weight: 500; }

  .btn-back {
    display: inline-flex; align-items: center; gap: 6px; flex-shrink: 0;
    padding: 8px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; font-size: 12px; font-weight: 500; color: var(--text-muted);
    cursor: pointer; text-decoration: none; transition: all .2s;
    font-family: 'Noto Sans JP', sans-serif; box-shadow: 0 2px 8px var(--shadow); white-space: nowrap;
  }
  .btn-back:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }

  /* ── Tabs ── */
  .tab-bar {
    display: flex; gap: 6px; margin-bottom: 20px;
    background: var(--surface); padding: 5px; border-radius: 12px;
    border: 1px solid var(--border); box-shadow: 0 2px 12px var(--shadow2);
  }
  .tab {
    flex: 1; padding: 9px 0; border-radius: 8px; border: none;
    background: transparent; color: var(--text-muted);
    font-family: 'Noto Sans JP', sans-serif; font-size: 13px; font-weight: 500;
    cursor: pointer; transition: all .2s;
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .tab.active {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; box-shadow: 0 3px 10px var(--shadow);
  }
  .tab:hover:not(.active) { background: var(--surface2); color: var(--text); }

  /* ── Panels ── */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ── Drop zone ── */
  .drop-zone {
    border: 2px dashed var(--border); border-radius: 14px; padding: 32px 24px;
    cursor: pointer; transition: all .3s; background: var(--surface);
    position: relative; overflow: hidden; margin-bottom: 16px;
    display: flex; align-items: center; justify-content: center; gap: 16px;
    box-shadow: 0 2px 12px var(--shadow2);
  }
  .drop-zone::before {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(ellipse at 50% 0%, rgba(224,90,122,.08) 0%, transparent 70%);
    opacity: 0; transition: opacity .3s;
  }
  .drop-zone:hover, .drop-zone.drag-over { border-color: var(--accent); background: var(--accent-light); }
  .drop-zone:hover::before, .drop-zone.drag-over::before { opacity: 1; }

  .drop-icon {
    width: 48px; height: 48px; flex-shrink: 0; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; box-shadow: 0 4px 14px var(--shadow);
  }
  .drop-text { text-align: left; }
  .drop-title { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .drop-sub { font-size: 12px; color: var(--text-muted); }
  .drop-sub b { color: var(--accent); font-weight: 600; }

  /* ── Section header ── */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin: 20px 0 12px; flex-wrap: wrap; gap: 8px;
  }
  .section-title {
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    font-family: 'DM Mono', monospace; letter-spacing: .1em; text-transform: uppercase;
  }

  /* ── Buttons ── */
  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: 9px; font-size: 13px; font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif; cursor: pointer; transition: all .2s; border: none;
  }
  .btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff; box-shadow: 0 4px 14px var(--shadow);
  }
  .btn-primary:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
  .btn-primary:disabled { opacity: .4; cursor: not-allowed; transform: none; }

  .btn-success {
    background: linear-gradient(135deg, var(--success), #059669);
    color: #fff; box-shadow: 0 4px 14px rgba(43,170,114,.25);
  }
  .btn-success:hover:not(:disabled) { opacity: .88; transform: translateY(-1px); }
  .btn-success:disabled { opacity: .4; cursor: not-allowed; }

  .btn-ghost {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-muted); box-shadow: 0 2px 8px var(--shadow2);
  }
  .btn-ghost:hover { color: var(--accent); border-color: var(--accent); background: var(--accent-light); }

  /* ── File list (merge) ── */
  .file-list { display: flex; flex-direction: column; gap: 8px; }

  .file-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; cursor: grab; transition: all .2s; user-select: none;
    box-shadow: 0 2px 8px var(--shadow2);
  }
  .file-item:hover { border-color: var(--accent); background: var(--accent-light); transform: translateX(2px); }
  .file-item.dragging { opacity: .4; cursor: grabbing; }
  .file-item.drag-target { border-color: var(--accent); border-style: dashed; background: var(--accent-light); }

  .drag-handle { color: var(--text-dim); font-size: 16px; flex-shrink: 0; }

  .file-icon-wrap {
    width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
    background: linear-gradient(135deg, rgba(224,90,122,.12), rgba(240,149,106,.12));
    display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .file-info { flex: 1; min-width: 0; }
  .file-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .file-meta { font-size: 11px; color: var(--text-muted); margin-top: 2px; font-family: 'DM Mono', monospace; }

  .file-actions { display: flex; gap: 6px; flex-shrink: 0; }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 7px; border: 1px solid var(--border);
    background: var(--surface2); color: var(--text-muted); cursor: pointer;
    display: flex; align-items: center; justify-content: center; font-size: 13px; transition: all .15s;
  }
  .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: var(--accent-light); }
  .icon-btn.danger:hover { border-color: var(--error); color: var(--error); background: rgba(224,64,64,.08); }

  /* ── Split controls ── */
  .split-controls {
    display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
    padding: 16px 20px; background: var(--surface); border-radius: 12px;
    border: 1px solid var(--border); margin-bottom: 16px; box-shadow: 0 2px 12px var(--shadow2);
  }
  .split-controls label { font-size: 12px; color: var(--text-muted); }

  .field-select {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: 'Noto Sans JP', sans-serif; font-size: 12px;
    padding: 7px 10px; cursor: pointer; outline: none; transition: border-color .2s;
  }
  .field-select:focus { border-color: var(--accent); }

  .field-input {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
    color: var(--text); font-family: 'DM Mono', monospace; font-size: 12px;
    padding: 7px 10px; width: 160px; outline: none; transition: border-color .2s;
  }
  .field-input:focus { border-color: var(--accent); }
  .field-input::placeholder { color: var(--text-dim); }

  /* ── Thumbnails ── */
  .thumbnails-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 14px; margin-top: 8px;
  }
  .thumb-item {
    display: flex; flex-direction: column; align-items: center;
    cursor: grab; transition: all .2s; padding: 10px;
    border-radius: 12px; border: 2px solid transparent;
    background: var(--surface); user-select: none;
    box-shadow: 0 2px 10px var(--shadow2);
  }
  .thumb-item:hover { border-color: var(--accent); background: var(--accent-light); transform: translateY(-2px); }
  .thumb-item.selected { border-color: var(--accent); background: var(--accent-light); }
  .thumb-item.dragging { opacity: .3; }
  .thumb-item.drag-target { border-color: var(--accent2); border-style: dashed; }

  .thumb-canvas {
    width: 110px; height: 150px; border-radius: 6px; overflow: hidden;
    background: #fff; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 3px 12px rgba(42,31,42,.12);
  }
  .thumb-canvas canvas { width: 100%; height: 100%; object-fit: contain; }
  .thumb-label { margin-top: 7px; font-size: 11px; color: var(--text-muted); font-family: 'DM Mono', monospace; }

  .thumb-wrapper { position: relative; }
  .thumb-num {
    position: absolute; top: 2px; right: 2px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: white; border-radius: 5px; font-size: 9px; padding: 2px 6px;
    font-weight: 700; font-family: 'DM Mono', monospace;
  }
  .thumb-check {
    position: absolute; top: 4px; left: 4px;
    width: 20px; height: 20px; border-radius: 50%;
    border: 2px solid var(--border); background: var(--surface);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    font-size: 10px; transition: all .15s;
  }
  .thumb-item.selected .thumb-check {
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-color: var(--accent); color: white;
  }

  /* ── Info badge ── */
  .info-badge {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 4px 12px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; font-size: 11px; color: var(--text-muted);
    font-family: 'DM Mono', monospace; box-shadow: 0 2px 8px var(--shadow2);
  }

  /* ── Toast ── */
  #toast-container { position: fixed; bottom: 24px; right: 24px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; }
  .toast {
    padding: 11px 18px; border-radius: 10px; font-size: 13px; font-weight: 500;
    animation: slideUp .3s ease; max-width: 300px; box-shadow: 0 4px 16px rgba(0,0,0,.12);
  }
  .toast.success { background: var(--success); color: white; }
  .toast.error   { background: var(--error); color: white; }
  .toast.info    { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; }
  @keyframes slideUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  /* ── Dots loader ── */
  .dots { display: inline-flex; gap: 3px; }
  .dots span { width: 4px; height: 4px; background: currentColor; border-radius: 50%; animation: dot 1.3s ease-in-out infinite; }
  .dots span:nth-child(2){animation-delay:.2s} .dots span:nth-child(3){animation-delay:.4s}
  @keyframes dot{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}

  #fileInputMerge, #fileInputSplit, #fileInputReorder { display: none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-top">
      <div>
        <div class="logo"><div class="logo-dot"></div>PDF Studio</div>
        <h1>PDF <span>編集ツール</span></h1>
        <p class="subtitle">対応機能：<span>結合 / 分割 / ページ並び替え</span></p>
      </div>
      <a class="btn-back" href="./index.html">← ポータルに戻る</a>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('merge',this)">🔗 PDF結合</button>
    <button class="tab" onclick="switchTab('split',this)">✂️ PDF分割</button>
    <button class="tab" onclick="switchTab('reorder',this)">🔀 並び替え</button>
  </div>

  <!-- MERGE -->
  <div id="panel-merge" class="panel active">
    <div class="drop-zone" id="mergeDropzone" onclick="document.getElementById('fileInputMerge').click()">
      <div class="drop-icon">📑</div>
      <div class="drop-text">
        <div class="drop-title">PDFファイルをここにドロップ</div>
        <div class="drop-sub">または <b>クリックして選択</b>（複数同時OK）</div>
      </div>
    </div>
    <input type="file" id="fileInputMerge" accept=".pdf" multiple>
    <div id="mergeFileList" style="display:none">
      <div class="section-header">
        <span class="section-title">ファイル一覧（ドラッグで順番変更）</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="document.getElementById('fileInputMerge').click()">＋ 追加</button>
          <button class="btn btn-success" onclick="mergePDFs()" id="mergeBtn">⬇ 結合してダウンロード</button>
        </div>
      </div>
      <div class="file-list" id="mergeList"></div>
    </div>
  </div>

  <!-- SPLIT -->
  <div id="panel-split" class="panel">
    <div class="drop-zone" id="splitDropzone" onclick="document.getElementById('fileInputSplit').click()">
      <div class="drop-icon">✂️</div>
      <div class="drop-text">
        <div class="drop-title">分割するPDFをここにドロップ</div>
        <div class="drop-sub">または <b>クリックして選択</b></div>
      </div>
    </div>
    <input type="file" id="fileInputSplit" accept=".pdf">
    <div id="splitPanel" style="display:none">
      <div class="section-header">
        <span class="section-title">分割設定</span>
        <span class="info-badge" id="splitFileInfo"></span>
      </div>
      <div class="split-controls">
        <label>分割方法：</label>
        <select class="field-select" id="splitMode" onchange="updateSplitUI()">
          <option value="all">全ページを個別に分割（ZIP）</option>
          <option value="range">ページ範囲を指定</option>
          <option value="visual">サムネイルで選択</option>
        </select>
        <div id="rangeInput" style="display:none;align-items:center;gap:8px">
          <label>範囲（例: 1-3, 5, 7-10）：</label>
          <input type="text" class="field-input" id="pageRange" placeholder="1-3, 5">
        </div>
        <button class="btn btn-primary" id="splitBtn" onclick="doSplit()">⬇ 分割＆ダウンロード</button>
      </div>
      <div id="splitThumbs" style="display:none">
        <div class="section-header">
          <span class="section-title">ページを選択（複数可）</span>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost" onclick="selectAllPages()">全選択</button>
            <button class="btn btn-ghost" onclick="clearPageSelection()">解除</button>
            <button class="btn btn-primary" onclick="downloadSelected()">⬇ 選択ページをダウンロード</button>
          </div>
        </div>
        <div class="thumbnails-grid" id="splitThumbGrid"></div>
      </div>
    </div>
  </div>

  <!-- REORDER -->
  <div id="panel-reorder" class="panel">
    <div class="drop-zone" id="reorderDropzone" onclick="document.getElementById('fileInputReorder').click()">
      <div class="drop-icon">🔀</div>
      <div class="drop-text">
        <div class="drop-title">並び替えるPDFをここにドロップ</div>
        <div class="drop-sub">または <b>クリックして選択</b></div>
      </div>
    </div>
    <input type="file" id="fileInputReorder" accept=".pdf">
    <div id="reorderPanel" style="display:none">
      <div class="section-header">
        <span class="section-title">ページ並び替え（ドラッグ＆ドロップ）</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="resetPageOrder()">リセット</button>
          <button class="btn btn-success" onclick="saveReordered()">⬇ 保存してダウンロード</button>
        </div>
      </div>
      <div class="thumbnails-grid" id="reorderThumbGrid"></div>
    </div>
  </div>

</div>
<div id="toast-container"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

let mergeFiles = [];
let splitFile=null, splitPdfDoc=null, splitPdfBytes=null, splitSelectedPages=new Set();
let reorderFile=null, reorderPdfDoc=null, reorderPdfBytes=null, reorderPageOrder=[];

function switchTab(tab, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-'+tab).classList.add('active');
  btn.classList.add('active');
}

function toast(msg, type='info') {
  const c=document.getElementById('toast-container');
  const t=document.createElement('div');
  t.className=`toast ${type}`; t.textContent=msg; c.appendChild(t);
  setTimeout(()=>t.remove(), 3500);
}

function formatBytes(b) {
  if(b<1024) return b+' B';
  if(b<1024*1024) return (b/1024).toFixed(1)+' KB';
  return (b/1024/1024).toFixed(1)+' MB';
}

async function renderThumb(pdfDoc, pageNum, canvasEl, scale=0.28) {
  try {
    const page=await pdfDoc.getPage(pageNum);
    const vp=page.getViewport({scale});
    canvasEl.width=vp.width; canvasEl.height=vp.height;
    await page.render({canvasContext:canvasEl.getContext('2d'),viewport:vp}).promise;
  } catch {
    const ctx=canvasEl.getContext('2d');
    ctx.fillStyle='#f0e8e8'; ctx.fillRect(0,0,canvasEl.width||110,canvasEl.height||150);
  }
}

async function getPageCount(file) {
  const bytes=await file.arrayBuffer();
  const doc=await pdfjsLib.getDocument({data:bytes}).promise;
  return doc.numPages;
}

// ── MERGE ──
const mergeDropzone=document.getElementById('mergeDropzone');
mergeDropzone.addEventListener('dragover',e=>{e.preventDefault();mergeDropzone.classList.add('drag-over');});
mergeDropzone.addEventListener('dragleave',()=>mergeDropzone.classList.remove('drag-over'));
mergeDropzone.addEventListener('drop',async e=>{
  e.preventDefault(); mergeDropzone.classList.remove('drag-over');
  await addMergeFiles([...e.dataTransfer.files].filter(f=>f.name.endsWith('.pdf')));
});
document.getElementById('fileInputMerge').addEventListener('change',async e=>{
  await addMergeFiles([...e.target.files]); e.target.value='';
});

async function addMergeFiles(files) {
  for(const file of files) {
    try { const pc=await getPageCount(file); mergeFiles.push({file,name:file.name,size:file.size,pageCount:pc}); }
    catch { toast(`${file.name} の読み込みに失敗しました`,'error'); }
  }
  renderMergeList();
}

function renderMergeList() {
  const list=document.getElementById('mergeList');
  const panel=document.getElementById('mergeFileList');
  if(!mergeFiles.length){panel.style.display='none';return;}
  panel.style.display='block'; list.innerHTML='';
  mergeFiles.forEach((item,i)=>{
    const div=document.createElement('div');
    div.className='file-item'; div.draggable=true; div.dataset.index=i;
    div.innerHTML=`
      <span class="drag-handle">⠿</span>
      <div class="file-icon-wrap">📄</div>
      <div class="file-info">
        <div class="file-name">${item.name}</div>
        <div class="file-meta">${formatBytes(item.size)} · ${item.pageCount}ページ</div>
      </div>
      <div class="file-actions">
        <button class="icon-btn" onclick="moveMergeFile(${i},-1)">↑</button>
        <button class="icon-btn" onclick="moveMergeFile(${i},1)">↓</button>
        <button class="icon-btn danger" onclick="removeMergeFile(${i})">✕</button>
      </div>`;
    setupMergeItemDrag(div,i);
    list.appendChild(div);
  });
}

function setupMergeItemDrag(el,idx) {
  el.addEventListener('dragstart',e=>{e.dataTransfer.setData('text/plain',idx);setTimeout(()=>el.classList.add('dragging'),0);});
  el.addEventListener('dragend',()=>el.classList.remove('dragging'));
  el.addEventListener('dragover',e=>{e.preventDefault();el.classList.add('drag-target');});
  el.addEventListener('dragleave',()=>el.classList.remove('drag-target'));
  el.addEventListener('drop',e=>{
    e.preventDefault(); el.classList.remove('drag-target');
    const from=parseInt(e.dataTransfer.getData('text/plain')), to=parseInt(el.dataset.index);
    if(from!==to){const tmp=mergeFiles.splice(from,1)[0]; mergeFiles.splice(to,0,tmp); renderMergeList();}
  });
}

function moveMergeFile(i,dir){const j=i+dir;if(j<0||j>=mergeFiles.length)return;[mergeFiles[i],mergeFiles[j]]=[mergeFiles[j],mergeFiles[i]];renderMergeList();}
function removeMergeFile(i){mergeFiles.splice(i,1);renderMergeList();}

async function mergePDFs() {
  if(mergeFiles.length<2){toast('2つ以上のファイルを追加してください','error');return;}
  const btn=document.getElementById('mergeBtn');
  btn.disabled=true; btn.innerHTML='<span class="dots"><span></span><span></span><span></span></span> 処理中...';
  try {
    const {PDFDocument}=PDFLib;
    const merged=await PDFDocument.create();
    for(const item of mergeFiles){
      const bytes=await item.file.arrayBuffer();
      const doc=await PDFDocument.load(bytes);
      const pages=await merged.copyPages(doc,doc.getPageIndices());
      pages.forEach(p=>merged.addPage(p));
    }
    downloadBytes(await merged.save(),'merged.pdf');
    toast('結合完了！ダウンロードを開始しました','success');
  } catch(e){toast('結合に失敗しました: '+e.message,'error');}
  btn.disabled=false; btn.innerHTML='⬇ 結合してダウンロード';
}

// ── SPLIT ──
const splitDropzone=document.getElementById('splitDropzone');
splitDropzone.addEventListener('dragover',e=>{e.preventDefault();splitDropzone.classList.add('drag-over');});
splitDropzone.addEventListener('dragleave',()=>splitDropzone.classList.remove('drag-over'));
splitDropzone.addEventListener('drop',e=>{
  e.preventDefault(); splitDropzone.classList.remove('drag-over');
  const file=[...e.dataTransfer.files].find(f=>f.name.endsWith('.pdf'));
  if(file) loadSplitFile(file);
});
document.getElementById('fileInputSplit').addEventListener('change',e=>{
  if(e.target.files[0]) loadSplitFile(e.target.files[0]); e.target.value='';
});

async function loadSplitFile(file) {
  splitFile=file; splitPdfBytes=await file.arrayBuffer();
  splitPdfDoc=await pdfjsLib.getDocument({data:splitPdfBytes.slice()}).promise;
  document.getElementById('splitPanel').style.display='block';
  document.getElementById('splitFileInfo').textContent=`📄 ${file.name}  ·  ${splitPdfDoc.numPages}ページ`;
  updateSplitUI();
}

function updateSplitUI() {
  const mode=document.getElementById('splitMode').value;
  document.getElementById('rangeInput').style.display=mode==='range'?'flex':'none';
  const ta=document.getElementById('splitThumbs');
  if(mode==='visual'){ta.style.display='block';renderSplitThumbs();}
  else ta.style.display='none';
}

async function renderSplitThumbs() {
  const grid=document.getElementById('splitThumbGrid');
  grid.innerHTML=''; splitSelectedPages.clear();
  for(let i=1;i<=splitPdfDoc.numPages;i++){
    const wrapper=document.createElement('div'); wrapper.className='thumb-wrapper';
    const item=document.createElement('div'); item.className='thumb-item'; item.dataset.page=i;
    const check=document.createElement('div'); check.className='thumb-check'; check.innerHTML='✓';
    const thumbBox=document.createElement('div'); thumbBox.className='thumb-canvas';
    const canvas=document.createElement('canvas'); thumbBox.appendChild(canvas);
    const label=document.createElement('div'); label.className='thumb-label'; label.textContent=`P.${i}`;
    const numBadge=document.createElement('div'); numBadge.className='thumb-num'; numBadge.textContent=i;
    item.appendChild(check); item.appendChild(thumbBox); item.appendChild(label);
    wrapper.appendChild(item); wrapper.appendChild(numBadge); grid.appendChild(wrapper);
    item.addEventListener('click',()=>toggleSplitPage(i,item));
    renderThumb(splitPdfDoc,i,canvas);
  }
}

function toggleSplitPage(page,el){
  if(splitSelectedPages.has(page)){splitSelectedPages.delete(page);el.classList.remove('selected');}
  else{splitSelectedPages.add(page);el.classList.add('selected');}
}
function selectAllPages(){
  document.querySelectorAll('#splitThumbGrid .thumb-item').forEach(el=>{splitSelectedPages.add(parseInt(el.dataset.page));el.classList.add('selected');});
}
function clearPageSelection(){
  splitSelectedPages.clear();
  document.querySelectorAll('#splitThumbGrid .thumb-item').forEach(el=>el.classList.remove('selected'));
}

async function downloadSelected(){
  if(!splitSelectedPages.size){toast('ページを選択してください','error');return;}
  const pages=[...splitSelectedPages].sort((a,b)=>a-b);
  const {PDFDocument}=PDFLib;
  const src=await PDFDocument.load(splitPdfBytes);
  const out=await PDFDocument.create();
  const copied=await out.copyPages(src,pages.map(p=>p-1));
  copied.forEach(p=>out.addPage(p));
  downloadBytes(await out.save(),`pages_${pages.join('-')}.pdf`);
  toast('ダウンロード完了！','success');
}

async function doSplit(){
  if(!splitPdfDoc){toast('ファイルを読み込んでください','error');return;}
  const btn=document.getElementById('splitBtn');
  btn.disabled=true; btn.innerHTML='<span class="dots"><span></span><span></span><span></span></span> 処理中...';
  try {
    const mode=document.getElementById('splitMode').value;
    const {PDFDocument}=PDFLib;
    const src=await PDFDocument.load(splitPdfBytes);
    const total=src.getPageCount();

    if(mode==='all'){
      const zip=new JSZip();
      const baseName=splitFile.name.replace(/\.pdf$/i,'');
      const digits=String(total).length;
      for(let i=0;i<total;i++){
        const doc=await PDFDocument.create();
        const [page]=await doc.copyPages(src,[i]); doc.addPage(page);
        zip.file(`${baseName}_page${String(i+1).padStart(digits,'0')}.pdf`,await doc.save());
      }
      const zipBlob=await zip.generateAsync({type:'blob'});
      const url=URL.createObjectURL(zipBlob);
      const a=document.createElement('a'); a.href=url; a.download=`${baseName}_split.zip`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),10000);
      toast(`${total}ページをZIPにまとめてダウンロードしました`,'success');

    } else if(mode==='range'){
      const range=document.getElementById('pageRange').value;
      const indices=parseRange(range,total);
      if(!indices.length){toast('有効なページ範囲を入力してください','error');btn.disabled=false;btn.innerHTML='⬇ 分割＆ダウンロード';return;}
      const doc=await PDFDocument.create();
      const copied=await doc.copyPages(src,indices.map(p=>p-1));
      copied.forEach(p=>doc.addPage(p));
      downloadBytes(await doc.save(),`split_${range.replace(/\s/g,'')}.pdf`);
      toast('分割完了！','success');

    } else if(mode==='visual'){
      await downloadSelected();
    }
  } catch(e){toast('処理に失敗しました: '+e.message,'error');}
  btn.disabled=false; btn.innerHTML='⬇ 分割＆ダウンロード';
}

function parseRange(str,max){
  const pages=new Set();
  str.split(',').forEach(part=>{
    part=part.trim();
    if(part.includes('-')){const[a,b]=part.split('-').map(Number);for(let i=a;i<=Math.min(b,max);i++)if(i>=1)pages.add(i);}
    else{const n=parseInt(part);if(n>=1&&n<=max)pages.add(n);}
  });
  return [...pages].sort((a,b)=>a-b);
}

// ── REORDER ──
const reorderDropzone=document.getElementById('reorderDropzone');
reorderDropzone.addEventListener('dragover',e=>{e.preventDefault();reorderDropzone.classList.add('drag-over');});
reorderDropzone.addEventListener('dragleave',()=>reorderDropzone.classList.remove('drag-over'));
reorderDropzone.addEventListener('drop',e=>{
  e.preventDefault(); reorderDropzone.classList.remove('drag-over');
  const file=[...e.dataTransfer.files].find(f=>f.name.endsWith('.pdf'));
  if(file) loadReorderFile(file);
});
document.getElementById('fileInputReorder').addEventListener('change',e=>{
  if(e.target.files[0]) loadReorderFile(e.target.files[0]); e.target.value='';
});

async function loadReorderFile(file){
  reorderFile=file; reorderPdfBytes=await file.arrayBuffer();
  reorderPdfDoc=await pdfjsLib.getDocument({data:reorderPdfBytes.slice()}).promise;
  reorderPageOrder=Array.from({length:reorderPdfDoc.numPages},(_,i)=>i);
  document.getElementById('reorderPanel').style.display='block';
  renderReorderThumbs();
}

async function renderReorderThumbs(){
  const grid=document.getElementById('reorderThumbGrid');
  grid.innerHTML='';
  for(let pos=0;pos<reorderPageOrder.length;pos++){
    const origPage=reorderPageOrder[pos]+1;
    const item=document.createElement('div');
    item.className='thumb-item'; item.draggable=true; item.dataset.pos=pos;
    const thumbBox=document.createElement('div'); thumbBox.className='thumb-canvas';
    const canvas=document.createElement('canvas'); thumbBox.appendChild(canvas);
    const label=document.createElement('div'); label.className='thumb-label';
    label.textContent=`P.${pos+1}（元: ${origPage}）`;
    item.appendChild(thumbBox); item.appendChild(label);
    grid.appendChild(item);
    renderThumb(reorderPdfDoc,origPage,canvas);
    setupReorderDrag(item,pos);
  }
}

let dragSrcPos=null;
function setupReorderDrag(el,pos){
  el.addEventListener('dragstart',e=>{dragSrcPos=pos;e.dataTransfer.effectAllowed='move';setTimeout(()=>el.classList.add('dragging'),0);});
  el.addEventListener('dragend',()=>{el.classList.remove('dragging');document.querySelectorAll('#reorderThumbGrid .thumb-item').forEach(t=>t.classList.remove('drag-target'));});
  el.addEventListener('dragover',e=>{e.preventDefault();document.querySelectorAll('#reorderThumbGrid .thumb-item').forEach(t=>t.classList.remove('drag-target'));el.classList.add('drag-target');});
  el.addEventListener('dragleave',()=>el.classList.remove('drag-target'));
  el.addEventListener('drop',e=>{
    e.preventDefault(); el.classList.remove('drag-target');
    const from=dragSrcPos, to=parseInt(el.dataset.pos);
    if(from!==null&&from!==to){const tmp=reorderPageOrder.splice(from,1)[0];reorderPageOrder.splice(to,0,tmp);renderReorderThumbs();toast('ページを移動しました','info');}
    dragSrcPos=null;
  });
}

function resetPageOrder(){
  if(!reorderPdfDoc)return;
  reorderPageOrder=Array.from({length:reorderPdfDoc.numPages},(_,i)=>i);
  renderReorderThumbs(); toast('順序をリセットしました','info');
}

async function saveReordered(){
  if(!reorderPdfDoc)return;
  const {PDFDocument}=PDFLib;
  const src=await PDFDocument.load(reorderPdfBytes);
  const out=await PDFDocument.create();
  const copied=await out.copyPages(src,reorderPageOrder);
  copied.forEach(p=>out.addPage(p));
  downloadBytes(await out.save(),reorderFile.name.replace('.pdf','')+'_reordered.pdf');
  toast('保存してダウンロードしました！','success');
}

function downloadBytes(bytes,filename){
  const blob=new Blob([bytes],{type:'application/pdf'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a'); a.href=url; a.download=filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=>URL.revokeObjectURL(url),10000);
}
</script>
