<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #6c5ce7;
    --accent2: #a29bfe;
    --danger: #e17055;
    --success: #00b894;
    --text: #e8e8f0;
    --muted: #6b6b8a;
    --card: #16162a;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(108,92,231,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(108,92,231,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 32px;
    height: 64px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .logo {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    background: linear-gradient(135deg, #fff 0%, var(--accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .logo span {
    color: var(--accent);
    -webkit-text-fill-color: var(--accent);
  }

  .tab-bar {
    display: flex;
    gap: 4px;
    background: var(--surface);
    padding: 4px;
    border-radius: 10px;
    border: 1px solid var(--border);
  }

  .tab {
    padding: 7px 18px;
    border-radius: 7px;
    border: none;
    background: transparent;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    color: white;
  }

  .tab:hover:not(.active) {
    background: var(--surface2);
    color: var(--text);
  }

  main {
    position: relative;
    z-index: 1;
    max-width: 1200px;
    margin: 0 auto;
    padding: 32px 24px;
  }

  /* ===================== PANELS ===================== */
  .panel { display: none; }
  .panel.active { display: block; }

  /* ===================== DROP ZONE ===================== */
  .dropzone {
    border: 2px dashed var(--border);
    border-radius: 20px;
    padding: 60px 40px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    background: var(--surface);
    position: relative;
    overflow: hidden;
  }

  .dropzone::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 50% 0%, rgba(108,92,231,0.08) 0%, transparent 70%);
    pointer-events: none;
  }

  .dropzone:hover, .dropzone.drag-over {
    border-color: var(--accent);
    background: rgba(108,92,231,0.06);
  }

  .dropzone-icon {
    font-size: 56px;
    margin-bottom: 16px;
    display: block;
    filter: drop-shadow(0 0 20px rgba(108,92,231,0.4));
  }

  .dropzone h2 {
    font-size: 22px;
    font-weight: 700;
    margin-bottom: 8px;
  }

  .dropzone p {
    color: var(--muted);
    font-size: 14px;
    font-family: 'DM Mono', monospace;
  }

  .upload-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 10px 24px;
    background: var(--accent);
    color: white;
    border-radius: 8px;
    font-weight: 600;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
    border: none;
    font-family: 'Syne', sans-serif;
  }

  .upload-btn:hover { background: #7c6ef7; transform: translateY(-1px); }

  /* ===================== FILE LIST ===================== */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin: 32px 0 16px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 2px;
    font-family: 'DM Mono', monospace;
  }

  .btn {
    padding: 8px 18px;
    border-radius: 8px;
    border: none;
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: #7c6ef7; transform: translateY(-1px); }
  .btn-danger { background: rgba(225,112,85,0.15); color: var(--danger); border: 1px solid rgba(225,112,85,0.3); }
  .btn-danger:hover { background: rgba(225,112,85,0.25); }
  .btn-ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
  .btn-ghost:hover { background: var(--surface); border-color: var(--accent); }
  .btn-success { background: rgba(0,184,148,0.15); color: var(--success); border: 1px solid rgba(0,184,148,0.3); }
  .btn-success:hover { background: rgba(0,184,148,0.25); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  .file-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .file-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    cursor: grab;
    transition: all 0.2s;
    user-select: none;
  }

  .file-item:hover {
    border-color: var(--accent);
    background: rgba(108,92,231,0.06);
    transform: translateX(2px);
  }

  .file-item.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }

  .file-item.drag-target {
    border-color: var(--accent);
    border-style: dashed;
    background: rgba(108,92,231,0.1);
  }

  .drag-handle {
    color: var(--muted);
    font-size: 18px;
    flex-shrink: 0;
    cursor: grab;
  }

  .file-icon { font-size: 28px; flex-shrink: 0; }

  .file-info { flex: 1; min-width: 0; }
  .file-name {
    font-size: 14px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .file-meta {
    font-size: 11px;
    color: var(--muted);
    margin-top: 2px;
    font-family: 'DM Mono', monospace;
  }

  .file-actions { display: flex; gap: 8px; flex-shrink: 0; }

  .icon-btn {
    width: 32px; height: 32px;
    border-radius: 7px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--muted);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    transition: all 0.15s;
  }

  .icon-btn:hover { border-color: var(--accent); color: var(--accent); background: rgba(108,92,231,0.1); }
  .icon-btn.danger:hover { border-color: var(--danger); color: var(--danger); background: rgba(225,112,85,0.1); }

  /* ===================== PAGE THUMBNAILS ===================== */
  .thumbnails-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
    gap: 16px;
    margin-top: 8px;
  }

  .thumb-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    cursor: grab;
    transition: all 0.2s;
    padding: 10px;
    border-radius: 12px;
    border: 2px solid transparent;
    background: var(--card);
    user-select: none;
  }

  .thumb-item:hover {
    border-color: var(--accent);
    background: rgba(108,92,231,0.06);
    transform: translateY(-2px);
  }

  .thumb-item.selected {
    border-color: var(--accent);
    background: rgba(108,92,231,0.12);
  }

  .thumb-item.dragging { opacity: 0.3; }
  .thumb-item.drag-target { border-color: var(--accent2); border-style: dashed; }

  .thumb-canvas {
    width: 120px;
    height: 160px;
    border-radius: 6px;
    overflow: hidden;
    background: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }

  .thumb-canvas canvas { width: 100%; height: 100%; object-fit: contain; }

  .thumb-label {
    margin-top: 8px;
    font-size: 11px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .thumb-num {
    position: absolute;
    top: 4px;
    right: 4px;
    background: var(--accent);
    color: white;
    border-radius: 4px;
    font-size: 10px;
    padding: 2px 6px;
    font-weight: 700;
  }

  .thumb-wrapper { position: relative; }

  .thumb-check {
    position: absolute;
    top: 4px;
    left: 4px;
    width: 20px; height: 20px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--surface);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 10px;
    transition: all 0.15s;
  }

  .thumb-item.selected .thumb-check {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* ===================== SPLIT PANEL ===================== */
  .split-controls {
    display: flex;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    padding: 20px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
    margin-bottom: 20px;
  }

  .split-controls label {
    font-size: 13px;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }

  .input-field {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    padding: 7px 12px;
    width: 100px;
    transition: border-color 0.2s;
  }

  .input-field:focus { outline: none; border-color: var(--accent); }

  /* ===================== TOAST ===================== */
  #toast-container {
    position: fixed;
    bottom: 24px;
    right: 24px;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .toast {
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13px;
    font-weight: 600;
    animation: slideUp 0.3s ease;
    max-width: 320px;
  }

  .toast.success { background: rgba(0,184,148,0.9); color: white; }
  .toast.error { background: rgba(225,112,85,0.9); color: white; }
  .toast.info { background: rgba(108,92,231,0.9); color: white; }

  @keyframes slideUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ===================== PROGRESS ===================== */
  .progress-bar {
    height: 3px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
    margin-top: 8px;
  }

  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 3px;
    transition: width 0.3s;
  }

  /* ===================== EMPTY STATE ===================== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
  }

  .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
  .empty-state p { font-size: 14px; }

  /* Split markers */
  .split-marker {
    position: absolute;
    top: -6px;
    right: -8px;
    width: 16px;
    height: 16px;
    background: var(--danger);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
    color: white;
    cursor: pointer;
    font-weight: 700;
    z-index: 10;
    transition: transform 0.15s;
  }

  .split-marker:hover { transform: scale(1.3); }

  .actions-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-top: 20px;
    padding: 16px;
    background: var(--surface);
    border-radius: 12px;
    border: 1px solid var(--border);
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 4px 10px;
    background: rgba(108,92,231,0.15);
    border: 1px solid rgba(108,92,231,0.3);
    border-radius: 20px;
    font-size: 11px;
    color: var(--accent2);
    font-family: 'DM Mono', monospace;
  }

  .file-select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    padding: 7px 12px;
    cursor: pointer;
  }

  .file-select:focus { outline: none; border-color: var(--accent); }

  #fileInputMerge, #fileInputSplit, #fileInputReorder { display: none; }
</style>
</head>
<body>

<header>
  <div class="logo">PDF<span>·</span>Studio</div>
  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('merge')">🔗 結合</button>
    <button class="tab" onclick="switchTab('split')">✂️ 分割</button>
    <button class="tab" onclick="switchTab('reorder')">🔀 並び替え</button>
  </div>
  <div style="width:100px"></div>
</header>

<main>
  <!-- ===================== MERGE PANEL ===================== -->
  <div id="panel-merge" class="panel active">
    <div class="dropzone" id="mergeDropzone" onclick="document.getElementById('fileInputMerge').click()">
      <span class="dropzone-icon">📑</span>
      <h2>PDFファイルをドロップ</h2>
      <p>複数のPDFをドラッグ＆ドロップ、または</p>
      <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('fileInputMerge').click()">ファイルを選択</button>
    </div>
    <input type="file" id="fileInputMerge" accept=".pdf" multiple>

    <div id="mergeFileList" style="display:none;">
      <div class="section-header">
        <span class="section-title">📂 ファイル一覧（ドラッグで順番変更）</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="document.getElementById('fileInputMerge').click()">＋ 追加</button>
          <button class="btn btn-success" onclick="mergePDFs()" id="mergeBtn">結合してダウンロード</button>
        </div>
      </div>
      <div class="file-list" id="mergeList"></div>
    </div>
  </div>

  <!-- ===================== SPLIT PANEL ===================== -->
  <div id="panel-split" class="panel">
    <div class="dropzone" id="splitDropzone" onclick="document.getElementById('fileInputSplit').click()">
      <span class="dropzone-icon">✂️</span>
      <h2>分割するPDFをドロップ</h2>
      <p>1つのPDFファイルをドラッグ＆ドロップ</p>
      <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('fileInputSplit').click()">ファイルを選択</button>
    </div>
    <input type="file" id="fileInputSplit" accept=".pdf">

    <div id="splitPanel" style="display:none;">
      <div class="section-header">
        <span class="section-title">✂️ 分割設定</span>
        <span class="badge" id="splitFileInfo"></span>
      </div>

      <div class="split-controls">
        <label>分割方法：</label>
        <select class="file-select" id="splitMode" onchange="updateSplitUI()">
          <option value="all">全ページを個別に分割</option>
          <option value="range">ページ範囲を指定</option>
          <option value="visual">サムネイルで選択</option>
        </select>

        <div id="rangeInput" style="display:none;align-items:center;gap:8px">
          <label>ページ範囲（例: 1-3, 5, 7-10）：</label>
          <input type="text" class="input-field" id="pageRange" placeholder="1-3, 5" style="width:160px">
        </div>

        <button class="btn btn-primary" onclick="doSplit()">⬇️ 分割＆ダウンロード</button>
      </div>

      <div id="splitThumbs" style="display:none;">
        <div class="section-header">
          <span class="section-title">ページを選択（複数選択可）</span>
          <div style="display:flex;gap:8px">
            <button class="btn btn-ghost" onclick="selectAllPages()">全選択</button>
            <button class="btn btn-ghost" onclick="clearPageSelection()">解除</button>
            <button class="btn btn-primary" onclick="downloadSelected()">選択ページをダウンロード</button>
          </div>
        </div>
        <div class="thumbnails-grid" id="splitThumbGrid"></div>
      </div>
    </div>
  </div>

  <!-- ===================== REORDER PANEL ===================== -->
  <div id="panel-reorder" class="panel">
    <div class="dropzone" id="reorderDropzone" onclick="document.getElementById('fileInputReorder').click()">
      <span class="dropzone-icon">🔀</span>
      <h2>ページを並び替えるPDFをドロップ</h2>
      <p>1つのPDFをドロップしてページを自由に並び替え</p>
      <button class="upload-btn" onclick="event.stopPropagation(); document.getElementById('fileInputReorder').click()">ファイルを選択</button>
    </div>
    <input type="file" id="fileInputReorder" accept=".pdf">

    <div id="reorderPanel" style="display:none;">
      <div class="section-header">
        <span class="section-title">🔀 ページ並び替え（ドラッグ＆ドロップ）</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="resetPageOrder()">リセット</button>
          <button class="btn btn-success" onclick="saveReordered()">保存してダウンロード</button>
        </div>
      </div>
      <div class="thumbnails-grid" id="reorderThumbGrid"></div>
    </div>
  </div>
</main>

<div id="toast-container"></div>

<script>
// Configure PDF.js worker
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ===================== STATE =====================
let mergeFiles = []; // {file, name, size, pageCount}
let splitFile = null;
let splitPdfDoc = null; // pdf.js doc for rendering
let splitPdfBytes = null;
let splitSelectedPages = new Set();
let reorderFile = null;
let reorderPdfDoc = null;
let reorderPdfBytes = null;
let reorderPageOrder = []; // [0,1,2,...] page indices

// ===================== TAB SWITCHING =====================
function switchTab(tab) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  event.target.classList.add('active');
}

// ===================== TOAST =====================
function toast(msg, type='info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`;
  t.textContent = msg;
  c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}

// ===================== FORMAT =====================
function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024*1024) return (b/1024).toFixed(1) + ' KB';
  return (b/1024/1024).toFixed(1) + ' MB';
}

// ===================== RENDER PDF THUMBNAIL =====================
async function renderThumb(pdfDoc, pageNum, canvasEl, scale=0.3) {
  try {
    const page = await pdfDoc.getPage(pageNum);
    const vp = page.getViewport({ scale });
    canvasEl.width = vp.width;
    canvasEl.height = vp.height;
    await page.render({ canvasContext: canvasEl.getContext('2d'), viewport: vp }).promise;
  } catch(e) {
    // Just fill grey on error
    const ctx = canvasEl.getContext('2d');
    ctx.fillStyle = '#ddd';
    ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);
  }
}

// ===================== GET PAGE COUNT =====================
async function getPageCount(file) {
  const bytes = await file.arrayBuffer();
  const doc = await pdfjsLib.getDocument({ data: bytes }).promise;
  return doc.numPages;
}

// ===================== MERGE PANEL =====================
const mergeDropzone = document.getElementById('mergeDropzone');
mergeDropzone.addEventListener('dragover', e => { e.preventDefault(); mergeDropzone.classList.add('drag-over'); });
mergeDropzone.addEventListener('dragleave', () => mergeDropzone.classList.remove('drag-over'));
mergeDropzone.addEventListener('drop', async e => {
  e.preventDefault();
  mergeDropzone.classList.remove('drag-over');
  const files = [...e.dataTransfer.files].filter(f => f.type === 'application/pdf' || f.name.endsWith('.pdf'));
  await addMergeFiles(files);
});

document.getElementById('fileInputMerge').addEventListener('change', async e => {
  await addMergeFiles([...e.target.files]);
  e.target.value = '';
});

async function addMergeFiles(files) {
  for (const file of files) {
    try {
      const pageCount = await getPageCount(file);
      mergeFiles.push({ file, name: file.name, size: file.size, pageCount });
    } catch(e) {
      toast(`${file.name} の読み込みに失敗しました`, 'error');
    }
  }
  renderMergeList();
}

function renderMergeList() {
  const list = document.getElementById('mergeList');
  const panel = document.getElementById('mergeFileList');

  if (mergeFiles.length === 0) {
    panel.style.display = 'none';
    return;
  }
  panel.style.display = 'block';

  list.innerHTML = '';
  mergeFiles.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'file-item';
    div.draggable = true;
    div.dataset.index = i;
    div.innerHTML = `
      <span class="drag-handle">⠿</span>
      <span class="file-icon">📄</span>
      <div class="file-info">
        <div class="file-name">${item.name}</div>
        <div class="file-meta">${formatBytes(item.size)} · ${item.pageCount}ページ</div>
      </div>
      <div class="file-actions">
        <button class="icon-btn" onclick="moveMergeFile(${i},-1)" title="上へ">↑</button>
        <button class="icon-btn" onclick="moveMergeFile(${i},1)" title="下へ">↓</button>
        <button class="icon-btn danger" onclick="removeMergeFile(${i})" title="削除">✕</button>
      </div>
    `;
    setupMergeItemDrag(div, i);
    list.appendChild(div);
  });
}

function setupMergeItemDrag(el, idx) {
  el.addEventListener('dragstart', e => {
    e.dataTransfer.setData('text/plain', idx);
    setTimeout(() => el.classList.add('dragging'), 0);
  });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-target'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-target'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-target');
    const from = parseInt(e.dataTransfer.getData('text/plain'));
    const to = parseInt(el.dataset.index);
    if (from !== to) {
      const tmp = mergeFiles.splice(from, 1)[0];
      mergeFiles.splice(to, 0, tmp);
      renderMergeList();
    }
  });
}

function moveMergeFile(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= mergeFiles.length) return;
  [mergeFiles[i], mergeFiles[j]] = [mergeFiles[j], mergeFiles[i]];
  renderMergeList();
}

function removeMergeFile(i) {
  mergeFiles.splice(i, 1);
  renderMergeList();
}

async function mergePDFs() {
  if (mergeFiles.length < 2) { toast('2つ以上のファイルを追加してください', 'error'); return; }
  const btn = document.getElementById('mergeBtn');
  btn.disabled = true; btn.textContent = '処理中...';
  try {
    const { PDFDocument } = PDFLib;
    const merged = await PDFDocument.create();
    for (const item of mergeFiles) {
      const bytes = await item.file.arrayBuffer();
      const doc = await PDFDocument.load(bytes);
      const pages = await merged.copyPages(doc, doc.getPageIndices());
      pages.forEach(p => merged.addPage(p));
    }
    const out = await merged.save();
    downloadBytes(out, 'merged.pdf');
    toast('結合完了！ダウンロードを開始しました', 'success');
  } catch(e) {
    toast('結合に失敗しました: ' + e.message, 'error');
  }
  btn.disabled = false; btn.textContent = '結合してダウンロード';
}

// ===================== SPLIT PANEL =====================
const splitDropzone = document.getElementById('splitDropzone');
splitDropzone.addEventListener('dragover', e => { e.preventDefault(); splitDropzone.classList.add('drag-over'); });
splitDropzone.addEventListener('dragleave', () => splitDropzone.classList.remove('drag-over'));
splitDropzone.addEventListener('drop', e => {
  e.preventDefault();
  splitDropzone.classList.remove('drag-over');
  const file = [...e.dataTransfer.files].find(f => f.name.endsWith('.pdf'));
  if (file) loadSplitFile(file);
});

document.getElementById('fileInputSplit').addEventListener('change', e => {
  if (e.target.files[0]) loadSplitFile(e.target.files[0]);
  e.target.value = '';
});

async function loadSplitFile(file) {
  splitFile = file;
  splitPdfBytes = await file.arrayBuffer();
  splitPdfDoc = await pdfjsLib.getDocument({ data: splitPdfBytes.slice() }).promise;
  document.getElementById('splitPanel').style.display = 'block';
  document.getElementById('splitFileInfo').textContent = `📄 ${file.name}  ·  ${splitPdfDoc.numPages}ページ`;
  updateSplitUI();
}

function updateSplitUI() {
  const mode = document.getElementById('splitMode').value;
  document.getElementById('rangeInput').style.display = mode === 'range' ? 'flex' : 'none';
  const thumbArea = document.getElementById('splitThumbs');
  if (mode === 'visual') {
    thumbArea.style.display = 'block';
    renderSplitThumbs();
  } else {
    thumbArea.style.display = 'none';
  }
}

async function renderSplitThumbs() {
  const grid = document.getElementById('splitThumbGrid');
  grid.innerHTML = '';
  splitSelectedPages.clear();
  for (let i = 1; i <= splitPdfDoc.numPages; i++) {
    const wrapper = document.createElement('div');
    wrapper.className = 'thumb-wrapper';
    const item = document.createElement('div');
    item.className = 'thumb-item';
    item.dataset.page = i;
    const check = document.createElement('div');
    check.className = 'thumb-check';
    check.innerHTML = '✓';
    const thumbBox = document.createElement('div');
    thumbBox.className = 'thumb-canvas';
    const canvas = document.createElement('canvas');
    thumbBox.appendChild(canvas);
    const label = document.createElement('div');
    label.className = 'thumb-label';
    label.textContent = `P.${i}`;
    const numBadge = document.createElement('div');
    numBadge.className = 'thumb-num';
    numBadge.textContent = i;

    item.appendChild(check);
    item.appendChild(thumbBox);
    item.appendChild(label);
    wrapper.appendChild(item);
    wrapper.appendChild(numBadge);
    grid.appendChild(wrapper);

    item.addEventListener('click', () => toggleSplitPage(i, item));
    renderThumb(splitPdfDoc, i, canvas);
  }
}

function toggleSplitPage(page, el) {
  if (splitSelectedPages.has(page)) {
    splitSelectedPages.delete(page);
    el.classList.remove('selected');
  } else {
    splitSelectedPages.add(page);
    el.classList.add('selected');
  }
}

function selectAllPages() {
  document.querySelectorAll('#splitThumbGrid .thumb-item').forEach(el => {
    const p = parseInt(el.dataset.page);
    splitSelectedPages.add(p);
    el.classList.add('selected');
  });
}

function clearPageSelection() {
  splitSelectedPages.clear();
  document.querySelectorAll('#splitThumbGrid .thumb-item').forEach(el => el.classList.remove('selected'));
}

async function downloadSelected() {
  if (splitSelectedPages.size === 0) { toast('ページを選択してください', 'error'); return; }
  const pages = [...splitSelectedPages].sort((a,b) => a-b);
  const { PDFDocument } = PDFLib;
  const src = await PDFDocument.load(splitPdfBytes);
  const out = await PDFDocument.create();
  const copied = await out.copyPages(src, pages.map(p => p-1));
  copied.forEach(p => out.addPage(p));
  const bytes = await out.save();
  downloadBytes(bytes, `pages_${pages.join('-')}.pdf`);
  toast('ダウンロード完了！', 'success');
}

async function doSplit() {
  if (!splitPdfDoc) { toast('ファイルを読み込んでください', 'error'); return; }
  const mode = document.getElementById('splitMode').value;
  const { PDFDocument } = PDFLib;
  const src = await PDFDocument.load(splitPdfBytes);
  const total = src.getPageCount();

  if (mode === 'all') {
    // ZIPにまとめて1ファイルでDL（ブラウザのDL制限を回避）
    const zip = new JSZip();
    const baseName = splitFile.name.replace(/\.pdf$/i, '');
    const digits = String(total).length;
    for (let i = 0; i < total; i++) {
      const doc = await PDFDocument.create();
      const [page] = await doc.copyPages(src, [i]);
      doc.addPage(page);
      const bytes = await doc.save();
      const pageNum = String(i + 1).padStart(digits, '0');
      zip.file(`${baseName}_page${pageNum}.pdf`, bytes);
    }
    const zipBlob = await zip.generateAsync({ type: 'blob' }, meta => {
      // ZIPの生成進捗をトースト表示（任意）
    });
    const url = URL.createObjectURL(zipBlob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `${baseName}_split.zip`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 10000);
    toast(`${total}ページをZIPにまとめてダウンロードしました`, 'success');
  } else if (mode === 'range') {
    const range = document.getElementById('pageRange').value;
    const indices = parseRange(range, total);
    if (!indices.length) { toast('有効なページ範囲を入力してください', 'error'); return; }
    const doc = await PDFDocument.create();
    const copied = await doc.copyPages(src, indices.map(p => p-1));
    copied.forEach(p => doc.addPage(p));
    const bytes = await doc.save();
    downloadBytes(bytes, `split_${range.replace(/\s/g,'')}.pdf`);
    toast('分割完了！', 'success');
  } else if (mode === 'visual') {
    await downloadSelected();
  }
}

function parseRange(str, max) {
  const pages = new Set();
  str.split(',').forEach(part => {
    part = part.trim();
    if (part.includes('-')) {
      const [a, b] = part.split('-').map(Number);
      for (let i = a; i <= Math.min(b, max); i++) if (i >= 1) pages.add(i);
    } else {
      const n = parseInt(part);
      if (n >= 1 && n <= max) pages.add(n);
    }
  });
  return [...pages].sort((a,b)=>a-b);
}

// ===================== REORDER PANEL =====================
const reorderDropzone = document.getElementById('reorderDropzone');
reorderDropzone.addEventListener('dragover', e => { e.preventDefault(); reorderDropzone.classList.add('drag-over'); });
reorderDropzone.addEventListener('dragleave', () => reorderDropzone.classList.remove('drag-over'));
reorderDropzone.addEventListener('drop', e => {
  e.preventDefault();
  reorderDropzone.classList.remove('drag-over');
  const file = [...e.dataTransfer.files].find(f => f.name.endsWith('.pdf'));
  if (file) loadReorderFile(file);
});

document.getElementById('fileInputReorder').addEventListener('change', e => {
  if (e.target.files[0]) loadReorderFile(e.target.files[0]);
  e.target.value = '';
});

async function loadReorderFile(file) {
  reorderFile = file;
  reorderPdfBytes = await file.arrayBuffer();
  reorderPdfDoc = await pdfjsLib.getDocument({ data: reorderPdfBytes.slice() }).promise;
  reorderPageOrder = Array.from({ length: reorderPdfDoc.numPages }, (_, i) => i);
  document.getElementById('reorderPanel').style.display = 'block';
  renderReorderThumbs();
}

async function renderReorderThumbs() {
  const grid = document.getElementById('reorderThumbGrid');
  grid.innerHTML = '';

  for (let pos = 0; pos < reorderPageOrder.length; pos++) {
    const origPage = reorderPageOrder[pos] + 1;
    const item = document.createElement('div');
    item.className = 'thumb-item';
    item.draggable = true;
    item.dataset.pos = pos;

    const thumbBox = document.createElement('div');
    thumbBox.className = 'thumb-canvas';
    const canvas = document.createElement('canvas');
    thumbBox.appendChild(canvas);

    const label = document.createElement('div');
    label.className = 'thumb-label';
    label.textContent = `P.${pos + 1}（元: ${origPage}）`;

    item.appendChild(thumbBox);
    item.appendChild(label);
    grid.appendChild(item);

    renderThumb(reorderPdfDoc, origPage, canvas);
    setupReorderDrag(item, pos);
  }
}

let dragSrcPos = null;

function setupReorderDrag(el, pos) {
  el.addEventListener('dragstart', e => {
    dragSrcPos = pos;
    e.dataTransfer.effectAllowed = 'move';
    setTimeout(() => el.classList.add('dragging'), 0);
  });
  el.addEventListener('dragend', () => {
    el.classList.remove('dragging');
    document.querySelectorAll('#reorderThumbGrid .thumb-item').forEach(t => t.classList.remove('drag-target'));
  });
  el.addEventListener('dragover', e => {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
    document.querySelectorAll('#reorderThumbGrid .thumb-item').forEach(t => t.classList.remove('drag-target'));
    el.classList.add('drag-target');
  });
  el.addEventListener('dragleave', () => el.classList.remove('drag-target'));
  el.addEventListener('drop', e => {
    e.preventDefault();
    el.classList.remove('drag-target');
    const from = dragSrcPos;
    const to = parseInt(el.dataset.pos);
    if (from !== null && from !== to) {
      const tmp = reorderPageOrder.splice(from, 1)[0];
      reorderPageOrder.splice(to, 0, tmp);
      renderReorderThumbs();
      toast('ページを移動しました', 'info');
    }
    dragSrcPos = null;
  });
}

function resetPageOrder() {
  if (!reorderPdfDoc) return;
  reorderPageOrder = Array.from({ length: reorderPdfDoc.numPages }, (_, i) => i);
  renderReorderThumbs();
  toast('順序をリセットしました', 'info');
}

async function saveReordered() {
  if (!reorderPdfDoc) return;
  const { PDFDocument } = PDFLib;
  const src = await PDFDocument.load(reorderPdfBytes);
  const out = await PDFDocument.create();
  const copied = await out.copyPages(src, reorderPageOrder);
  copied.forEach(p => out.addPage(p));
  const bytes = await out.save();
  const name = reorderFile.name.replace('.pdf', '') + '_reordered.pdf';
  downloadBytes(bytes, name);
  toast('保存してダウンロードしました！', 'success');
}

// ===================== DOWNLOAD UTIL =====================
function downloadBytes(bytes, filename) {
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}
