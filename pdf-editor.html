<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Studio</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#fff8f8; --surface:#ffffff; --surface2:#fdf3f3;
  --border:#f0dede; --border2:#f7ecec;
  --accent:#e05a7a; --accent2:#f0956a; --accent-light:rgba(224,90,122,.08);
  --success:#2baa72; --warning:#e8972a; --error:#e04040;
  --text:#2a1f2a; --text-muted:#9a8090; --text-dim:#d0c0c8;
  --shadow:rgba(224,90,122,.10); --shadow2:rgba(224,90,122,.06);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background-image:radial-gradient(circle at 15% 20%,rgba(224,90,122,.06) 0%,transparent 50%),radial-gradient(circle at 85% 80%,rgba(240,149,106,.06) 0%,transparent 50%);pointer-events:none;z-index:0}
.container{max-width:960px;margin:0 auto;padding:24px 20px 60px;position:relative;z-index:1}

/* Header */
header{margin-bottom:20px}
.header-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px}
.logo{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;letter-spacing:.3em;color:var(--accent);text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.logo-dot{width:7px;height:7px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
h1{font-size:22px;font-weight:700;letter-spacing:-.02em;margin-bottom:4px}
h1 span{background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{font-size:12px;color:var(--text-muted);margin-bottom:10px;letter-spacing:.02em}
.subtitle span{color:var(--accent2);font-weight:500}
.btn-back{display:inline-flex;align-items:center;gap:6px;flex-shrink:0;padding:8px 16px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:12px;font-weight:500;color:var(--text-muted);cursor:pointer;text-decoration:none;transition:all .2s;font-family:'Noto Sans JP',sans-serif;box-shadow:0 2px 8px var(--shadow);white-space:nowrap}
.btn-back:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-light)}

/* Tabs */
.tab-bar{display:flex;gap:6px;margin-bottom:20px;background:var(--surface);padding:5px;border-radius:12px;border:1px solid var(--border);box-shadow:0 2px 12px var(--shadow2)}
.tab{flex:1;padding:9px 0;border-radius:8px;border:none;background:transparent;color:var(--text-muted);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:5px}
.tab.active{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;box-shadow:0 3px 10px var(--shadow)}
.tab:hover:not(.active){background:var(--surface2);color:var(--text)}
.panel{display:none}.panel.active{display:block}

/* Drop zone */
.drop-zone{border:2px dashed var(--border);border-radius:14px;padding:32px 24px;cursor:pointer;transition:all .3s;background:var(--surface);position:relative;overflow:hidden;margin-bottom:16px;display:flex;align-items:center;justify-content:center;gap:16px;box-shadow:0 2px 12px var(--shadow2)}
.drop-zone::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(224,90,122,.08) 0%,transparent 70%);opacity:0;transition:opacity .3s}
.drop-zone:hover,.drop-zone.drag-over{border-color:var(--accent);background:var(--accent-light)}
.drop-zone:hover::before,.drop-zone.drag-over::before{opacity:1}
.drop-icon{width:48px;height:48px;flex-shrink:0;border-radius:12px;background:linear-gradient(135deg,var(--accent),var(--accent2));display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 4px 14px var(--shadow)}
.drop-text{text-align:left}
.drop-title{font-size:15px;font-weight:600;margin-bottom:4px}
.drop-sub{font-size:12px;color:var(--text-muted)}
.drop-sub b{color:var(--accent);font-weight:600}

/* Section header */
.section-header{display:flex;align-items:center;justify-content:space-between;margin:20px 0 12px;flex-wrap:wrap;gap:8px}
.section-title{font-size:11px;font-weight:500;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.1em;text-transform:uppercase}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 18px;border-radius:9px;font-size:13px;font-weight:500;font-family:'Noto Sans JP',sans-serif;cursor:pointer;transition:all .2s;border:none}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 4px 14px var(--shadow)}
.btn-primary:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none}
.btn-success{background:linear-gradient(135deg,var(--success),#059669);color:#fff;box-shadow:0 4px 14px rgba(43,170,114,.25)}
.btn-success:hover:not(:disabled){opacity:.88;transform:translateY(-1px)}
.btn-success:disabled{opacity:.4;cursor:not-allowed}
.btn-ghost{background:var(--surface);border:1px solid var(--border);color:var(--text-muted);box-shadow:0 2px 8px var(--shadow2)}
.btn-ghost:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-light)}

/* File list */
.file-list{display:flex;flex-direction:column;gap:8px}
.file-item{display:flex;align-items:center;gap:12px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:10px;cursor:grab;transition:all .2s;user-select:none;box-shadow:0 2px 8px var(--shadow2)}
.file-item:hover{border-color:var(--accent);background:var(--accent-light);transform:translateX(2px)}
.file-item.dragging{opacity:.4;cursor:grabbing}
.file-item.drag-target{border-color:var(--accent);border-style:dashed;background:var(--accent-light)}
.drag-handle{color:var(--text-dim);font-size:16px;flex-shrink:0}
.file-icon-wrap{width:36px;height:36px;border-radius:8px;flex-shrink:0;background:linear-gradient(135deg,rgba(224,90,122,.12),rgba(240,149,106,.12));display:flex;align-items:center;justify-content:center;font-size:18px}
.file-info{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-meta{font-size:11px;color:var(--text-muted);margin-top:2px;font-family:'DM Mono',monospace}
.file-actions{display:flex;gap:6px;flex-shrink:0}
.icon-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:13px;transition:all .15s}
.icon-btn:hover{border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.icon-btn.danger:hover{border-color:var(--error);color:var(--error);background:rgba(224,64,64,.08)}

/* Split controls */
.split-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:16px 20px;background:var(--surface);border-radius:12px;border:1px solid var(--border);margin-bottom:16px;box-shadow:0 2px 12px var(--shadow2)}
.split-controls label{font-size:12px;color:var(--text-muted)}
.field-select{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:12px;padding:7px 10px;cursor:pointer;outline:none;transition:border-color .2s}
.field-select:focus{border-color:var(--accent)}
.field-input{background:var(--surface2);border:1px solid var(--border);border-radius:7px;color:var(--text);font-family:'DM Mono',monospace;font-size:12px;padding:7px 10px;width:160px;outline:none;transition:border-color .2s}
.field-input:focus{border-color:var(--accent)}
.field-input::placeholder{color:var(--text-dim)}

/* Thumbnails */
.thumbnails-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:14px;margin-top:8px}
.thumb-item{display:flex;flex-direction:column;align-items:center;cursor:grab;transition:all .2s;padding:10px;border-radius:12px;border:2px solid transparent;background:var(--surface);user-select:none;box-shadow:0 2px 10px var(--shadow2)}
.thumb-item:hover{border-color:var(--accent);background:var(--accent-light);transform:translateY(-2px)}
.thumb-item.selected{border-color:var(--accent);background:var(--accent-light)}
.thumb-item.dragging{opacity:.3}
.thumb-item.drag-target{border-color:var(--accent2);border-style:dashed}
.thumb-canvas{width:110px;height:150px;border-radius:6px;overflow:hidden;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(42,31,42,.12)}
.thumb-canvas canvas{width:100%;height:100%;object-fit:contain}
.thumb-label{margin-top:7px;font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace}
.thumb-wrapper{position:relative}
.thumb-num{position:absolute;top:2px;right:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:white;border-radius:5px;font-size:9px;padding:2px 6px;font-weight:700;font-family:'DM Mono',monospace}
.thumb-check{position:absolute;top:4px;left:4px;width:20px;height:20px;border-radius:50%;border:2px solid var(--border);background:var(--surface);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:10px;transition:all .15s}
.thumb-item.selected .thumb-check{background:linear-gradient(135deg,var(--accent),var(--accent2));border-color:var(--accent);color:white}

/* Info badge */
.info-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;background:var(--surface);border:1px solid var(--border);border-radius:20px;font-size:11px;color:var(--text-muted);font-family:'DM Mono',monospace;box-shadow:0 2px 8px var(--shadow2)}

/* Toast */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast{padding:11px 18px;border-radius:10px;font-size:13px;font-weight:500;animation:slideUp .3s ease;max-width:300px;box-shadow:0 4px 16px rgba(0,0,0,.12)}
.toast.success{background:var(--success);color:white}
.toast.error{background:var(--error);color:white}
.toast.info{background:linear-gradient(135deg,var(--accent),var(--accent2));color:white}
@keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.dots{display:inline-flex;gap:3px}
.dots span{width:4px;height:4px;background:currentColor;border-radius:50%;animation:dot 1.3s ease-in-out infinite}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes dot{0%,80%,100%{transform:scale(.5);opacity:.4}40%{transform:scale(1);opacity:1}}

/* ═══════════════════════════════════════
   DRAW PANEL
═══════════════════════════════════════ */

/* Page selector */
.draw-page-nav{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;box-shadow:0 2px 12px var(--shadow2)}
.draw-page-nav label{font-size:12px;color:var(--text-muted)}
.page-nav-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:var(--surface2);color:var(--text-muted);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.page-nav-btn:hover:not(:disabled){border-color:var(--accent);color:var(--accent);background:var(--accent-light)}
.page-nav-btn:disabled{opacity:.3;cursor:not-allowed}
.page-info{font-family:'DM Mono',monospace;font-size:12px;color:var(--text-muted);background:var(--surface2);border:1px solid var(--border);border-radius:20px;padding:4px 14px;min-width:60px;text-align:center}

/* Tool palette */
.tool-palette{display:flex;flex-wrap:wrap;gap:8px;padding:14px 16px;background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:14px;box-shadow:0 2px 12px var(--shadow2);align-items:center}
.palette-group{display:flex;gap:6px;align-items:center}
.palette-sep{width:1px;height:28px;background:var(--border);flex-shrink:0}

.tool-btn{width:36px;height:36px;border-radius:8px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;transition:all .15s;flex-shrink:0;position:relative}
.tool-btn:hover{border-color:var(--accent);background:var(--accent-light)}
.tool-btn.active{border-color:var(--accent);background:linear-gradient(135deg,rgba(224,90,122,.18),rgba(240,149,106,.18));box-shadow:0 2px 8px var(--shadow)}
.tool-btn svg{width:18px;height:18px;stroke:var(--text-muted);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.tool-btn.active svg{stroke:var(--accent)}
.tool-btn:hover svg{stroke:var(--accent)}

.tool-label{font-size:10px;color:var(--text-muted);font-family:'DM Mono',monospace;letter-spacing:.05em}

/* Color swatches */
.color-swatches{display:flex;gap:5px;align-items:center}
.swatch{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2.5px solid transparent;transition:all .15s;flex-shrink:0}
.swatch.active{border-color:var(--text);transform:scale(1.2)}
.swatch:hover{transform:scale(1.15)}

/* Stroke width */
.stroke-btns{display:flex;gap:4px;align-items:center}
.stroke-btn{width:32px;height:28px;border-radius:6px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s}
.stroke-btn:hover{border-color:var(--accent)}
.stroke-btn.active{border-color:var(--accent);background:var(--accent-light)}
.stroke-btn svg{stroke:var(--text-muted)}
.stroke-btn.active svg{stroke:var(--accent)}

/* Fill toggle */
.fill-btn{display:inline-flex;align-items:center;gap:5px;padding:5px 10px;border-radius:7px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;font-size:11px;color:var(--text-muted);font-family:'Noto Sans JP',sans-serif;transition:all .15s}
.fill-btn:hover{border-color:var(--accent);color:var(--accent)}
.fill-btn.active{border-color:var(--accent);background:var(--accent-light);color:var(--accent)}

/* Canvas wrapper */
.draw-canvas-wrap{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:12px;overflow:hidden;box-shadow:0 4px 20px var(--shadow2);display:flex;align-items:flex-start;justify-content:center;padding:20px;min-height:200px}
.draw-canvas-inner{position:relative;display:inline-block}
#pdfRenderCanvas{display:block;border-radius:4px;box-shadow:0 4px 20px rgba(42,31,42,.15)}
#drawCanvas{position:absolute;top:0;left:0;border-radius:4px}

/* Polygon snap indicator */
.snap-dot{width:10px;height:10px;border-radius:50%;background:var(--accent);border:2px solid white;position:absolute;pointer-events:none;display:none;transform:translate(-50%,-50%);box-shadow:0 0 6px var(--accent)}

/* Action bar */
.draw-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px;align-items:center}

/* Undo/redo hint */
.kbd{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;background:var(--surface2);border:1px solid var(--border);border-radius:5px;font-family:'DM Mono',monospace;font-size:10px;color:var(--text-muted)}

#fileInputDraw{display:none}
#fileInputMerge,#fileInputSplit,#fileInputReorder{display:none}
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="header-top">
      <div>
        <div class="logo"><div class="logo-dot"></div>PDF Studio</div>
        <h1>PDF <span>編集ツール</span></h1>
        <p class="subtitle">対応機能：<span>結合 / 分割 / 並び替え / 書き込み</span></p>
      </div>
      <a class="btn-back" href="./index.html">← ポータルに戻る</a>
    </div>
  </header>

  <div class="tab-bar">
    <button class="tab active" onclick="switchTab('merge',this)">🔗 PDF結合</button>
    <button class="tab" onclick="switchTab('split',this)">✂️ PDF分割</button>
    <button class="tab" onclick="switchTab('reorder',this)">🔀 並び替え</button>
    <button class="tab" onclick="switchTab('draw',this)">✏️ 書き込み</button>
  </div>

  <!-- ═══ MERGE ═══ -->
  <div id="panel-merge" class="panel active">
    <div class="drop-zone" id="mergeDropzone" onclick="document.getElementById('fileInputMerge').click()">
      <div class="drop-icon">📑</div>
      <div class="drop-text">
        <div class="drop-title">PDFファイルをここにドロップ</div>
        <div class="drop-sub">または <b>クリックして選択</b>（複数同時OK）</div>
      </div>
    </div>
    <input type="file" id="fileInputMerge" accept=".pdf" multiple>
    <div id="mergeFileList" style="display:none">
      <div class="section-header">
        <span class="section-title">ファイル一覧（ドラッグで順番変更）</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="document.getElementById('fileInputMerge').click()">＋ 追加</button>
          <button class="btn btn-success" onclick="mergePDFs()" id="mergeBtn">⬇ 結合してダウンロード</button>
        </div>
      </div>
      <div class="file-list" id="mergeList"></div>
    </div>
  </div>

  <!-- ═══ SPLIT ═══ -->
  <div id="panel-split" class="panel">
    <div class="drop-zone" id="splitDropzone" onclick="document.getElementById('fileInputSplit').click()">
      <div class="drop-icon">✂️</div>
      <div class="drop-text">
        <div class="drop-title">分割するPDFをここにドロップ</div>
        <div class="drop-sub">または <b>クリックして選択</b></div>
      </div>
    </div>
    <input type="file" id="fileInputSplit" accept=".pdf">
    <div id="splitPanel" style="display:none">
      <div class="section-header">
        <span class="section-title">分割設定</span>
        <span class="info-badge" id="splitFileInfo"></span>
      </div>
      <div class="split-controls">
        <label>分割方法：</label>
        <select class="field-select" id="splitMode" onchange="updateSplitUI()">
          <option value="all">全ページを個別に分割（ZIP）</option>
          <option value="range">ページ範囲を指定</option>
          <option value="visual">サムネイルで選択</option>
        </select>
        <div id="rangeInput" style="display:none;align-items:center;gap:8px;flex-wrap:wrap">
          <label>範囲（例: 1-3, 5, 7-10）：</label>
          <input type="text" class="field-input" id="pageRange" placeholder="1-3, 5">
          <label>ファイル名：</label>
          <input type="text" class="field-input" id="rangeFileName" placeholder="例：第1章（省略可）" style="width:190px">
        </div>
        <button class="btn btn-primary" id="splitBtn" onclick="doSplit()">⬇ 分割＆ダウンロード</button>
      </div>
      <div id="splitThumbs" style="display:none">
        <div class="section-header">
          <span class="section-title">ページを選択（複数可）</span>
          <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
            <button class="btn btn-ghost" onclick="selectAllPages()">全選択</button>
            <button class="btn btn-ghost" onclick="clearPageSelection()">解除</button>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap">
          <label style="font-size:12px;color:var(--text-muted)">ファイル名：</label>
          <input type="text" class="field-input" id="visualFileName" placeholder="例：抜粋ページ（省略可）" style="width:220px">
          <button class="btn btn-primary" onclick="downloadSelected()">⬇ 選択ページをダウンロード</button>
        </div>
        <div class="thumbnails-grid" id="splitThumbGrid"></div>
      </div>
    </div>
  </div>

  <!-- ═══ REORDER ═══ -->
  <div id="panel-reorder" class="panel">
    <div class="drop-zone" id="reorderDropzone" onclick="document.getElementById('fileInputReorder').click()">
      <div class="drop-icon">🔀</div>
      <div class="drop-text">
        <div class="drop-title">並び替えるPDFをここにドロップ</div>
        <div class="drop-sub">または <b>クリックして選択</b></div>
      </div>
    </div>
    <input type="file" id="fileInputReorder" accept=".pdf">
    <div id="reorderPanel" style="display:none">
      <div class="section-header">
        <span class="section-title">ページ並び替え（ドラッグ＆ドロップ）</span>
        <div style="display:flex;gap:8px">
          <button class="btn btn-ghost" onclick="resetPageOrder()">リセット</button>
          <button class="btn btn-success" onclick="saveReordered()">⬇ 保存してダウンロード</button>
        </div>
      </div>
      <div class="thumbnails-grid" id="reorderThumbGrid"></div>
    </div>
  </div>

  <!-- ═══ DRAW ═══ -->
  <div id="panel-draw" class="panel">
    <div class="drop-zone" id="drawDropzone" onclick="document.getElementById('fileInputDraw').click()">
      <div class="drop-icon">✏️</div>
      <div class="drop-text">
        <div class="drop-title">書き込むPDFをここにドロップ</div>

<div id="toast-container"></div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ────────────────────────────────────────
// Shared utils
// ────────────────────────────────────────
function switchTab(tab, btn) {
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('panel-' + tab).classList.add('active');
  btn.classList.add('active');
}
function toast(msg, type = 'info') {
  const c = document.getElementById('toast-container');
  const t = document.createElement('div');
  t.className = `toast ${type}`; t.textContent = msg; c.appendChild(t);
  setTimeout(() => t.remove(), 3500);
}
function formatBytes(b) {
  if (b < 1024) return b + ' B';
  if (b < 1024 * 1024) return (b / 1024).toFixed(1) + ' KB';
  return (b / 1024 / 1024).toFixed(1) + ' MB';
}
async function renderPageToCanvas(pdfDoc, pageNum, canvas, scale = 1.4) {
  const page = await pdfDoc.getPage(pageNum);
  const vp = page.getViewport({ scale });
  canvas.width = vp.width; canvas.height = vp.height;
  await page.render({ canvasContext: canvas.getContext('2d'), viewport: vp }).promise;
  return vp;
}
async function getPageCount(file) {
  const bytes = await file.arrayBuffer();
  const doc = await pdfjsLib.getDocument({ data: bytes }).promise;
  return doc.numPages;
}

// ────────────────────────────────────────
// MERGE
// ────────────────────────────────────────
let mergeFiles = [];
const mergeDropzone = document.getElementById('mergeDropzone');
mergeDropzone.addEventListener('dragover', e => { e.preventDefault(); mergeDropzone.classList.add('drag-over'); });
mergeDropzone.addEventListener('dragleave', () => mergeDropzone.classList.remove('drag-over'));
mergeDropzone.addEventListener('drop', async e => {
  e.preventDefault(); mergeDropzone.classList.remove('drag-over');
  await addMergeFiles([...e.dataTransfer.files].filter(f => f.name.endsWith('.pdf')));
});
document.getElementById('fileInputMerge').addEventListener('change', async e => {
  await addMergeFiles([...e.target.files]); e.target.value = '';
});
async function addMergeFiles(files) {
  for (const file of files) {
    try { mergeFiles.push({ file, name: file.name, size: file.size, pageCount: await getPageCount(file) }); }
    catch { toast(`${file.name} の読み込みに失敗しました`, 'error'); }
  }
  renderMergeList();
}
function renderMergeList() {
  const list = document.getElementById('mergeList');
  const panel = document.getElementById('mergeFileList');
  if (!mergeFiles.length) { panel.style.display = 'none'; return; }
  panel.style.display = 'block'; list.innerHTML = '';
  mergeFiles.forEach((item, i) => {
    const div = document.createElement('div');
    div.className = 'file-item'; div.draggable = true; div.dataset.index = i;
    div.innerHTML = `<span class="drag-handle">⠿</span><div class="file-icon-wrap">📄</div><div class="file-info"><div class="file-name">${item.name}</div><div class="file-meta">${formatBytes(item.size)} · ${item.pageCount}ページ</div></div><div class="file-actions"><button class="icon-btn" onclick="moveMergeFile(${i},-1)">↑</button><button class="icon-btn" onclick="moveMergeFile(${i},1)">↓</button><button class="icon-btn danger" onclick="removeMergeFile(${i})">✕</button></div>`;
    setupMergeItemDrag(div, i); list.appendChild(div);
  });
}
function setupMergeItemDrag(el, idx) {
  el.addEventListener('dragstart', e => { e.dataTransfer.setData('text/plain', idx); setTimeout(() => el.classList.add('dragging'), 0); });
  el.addEventListener('dragend', () => el.classList.remove('dragging'));
  el.addEventListener('dragover', e => { e.preventDefault(); el.classList.add('drag-target'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-target'));
  el.addEventListener('drop', e => {
    e.preventDefault(); el.classList.remove('drag-target');
    const from = parseInt(e.dataTransfer.getData('text/plain')), to = parseInt(el.dataset.index);
    if (from !== to) { const tmp = mergeFiles.splice(from, 1)[0]; mergeFiles.splice(to, 0, tmp); renderMergeList(); }
  });
}
function moveMergeFile(i, dir) { const j = i + dir; if (j < 0 || j >= mergeFiles.length) return; [mergeFiles[i], mergeFiles[j]] = [mergeFiles[j], mergeFiles[i]]; renderMergeList(); }
function removeMergeFile(i) { mergeFiles.splice(i, 1); renderMergeList(); }
async function mergePDFs() {
  if (mergeFiles.length < 2) { toast('2つ以上のファイルを追加してください', 'error'); return; }
  const btn = document.getElementById('mergeBtn');
  btn.disabled = true; btn.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> 処理中...';
  try {
    const { PDFDocument } = PDFLib;
    const merged = await PDFDocument.create();
    for (const item of mergeFiles) {
      const bytes = await item.file.arrayBuffer();
      const doc = await PDFDocument.load(bytes);
      const pages = await merged.copyPages(doc, doc.getPageIndices());
      pages.forEach(p => merged.addPage(p));
    }
    downloadBytes(await merged.save(), 'merged.pdf');
    toast('結合完了！', 'success');
  } catch (e) { toast('結合に失敗しました: ' + e.message, 'error'); }
  btn.disabled = false; btn.innerHTML = '⬇ 結合してダウンロード';
}

// ────────────────────────────────────────
// SPLIT
// ────────────────────────────────────────
let splitFile = null, splitPdfDoc = null, splitPdfBytes = null, splitSelectedPages = new Set();
const splitDropzone = document.getElementById('splitDropzone');
splitDropzone.addEventListener('dragover', e => { e.preventDefault(); splitDropzone.classList.add('drag-over'); });
splitDropzone.addEventListener('dragleave', () => splitDropzone.classList.remove('drag-over'));
splitDropzone.addEventListener('drop', e => {
  e.preventDefault(); splitDropzone.classList.remove('drag-over');
  const file = [...e.dataTransfer.files].find(f => f.name.endsWith('.pdf'));
  if (file) loadSplitFile(file);
});
document.getElementById('fileInputSplit').addEventListener('change', e => { if (e.target.files[0]) loadSplitFile(e.target.files[0]); e.target.value = ''; });
async function loadSplitFile(file) {
  splitFile = file; splitPdfBytes = await file.arrayBuffer();
  splitPdfDoc = await pdfjsLib.getDocument({ data: splitPdfBytes.slice() }).promise;
  document.getElementById('splitPanel').style.display = 'block';
  document.getElementById('splitFileInfo').textContent = `📄 ${file.name}  ·  ${splitPdfDoc.numPages}ページ`;
  updateSplitUI();
}
function updateSplitUI() {
  const mode = document.getElementById('splitMode').value;
  document.getElementById('rangeInput').style.display = mode === 'range' ? 'flex' : 'none';
  const ta = document.getElementById('splitThumbs');
  if (mode === 'visual') { ta.style.display = 'block'; renderSplitThumbs(); } else ta.style.display = 'none';
}
async function renderThumb(pdfDoc, pageNum, canvasEl, scale = 0.28) {
  try {
    const page = await pdfDoc.getPage(pageNum);
    const vp = page.getViewport({ scale });
    canvasEl.width = vp.width; canvasEl.height = vp.height;
    await page.render({ canvasContext: canvasEl.getContext('2d'), viewport: vp }).promise;
  } catch { const ctx = canvasEl.getContext('2d'); ctx.fillStyle = '#f0e8e8'; ctx.fillRect(0, 0, 110, 150); }
}
async function renderSplitThumbs() {
  const grid = document.getElementById('splitThumbGrid');
  grid.innerHTML = ''; splitSelectedPages.clear();
  for (let i = 1; i <= splitPdfDoc.numPages; i++) {
    const wrapper = document.createElement('div'); wrapper.className = 'thumb-wrapper';
    const item = document.createElement('div'); item.className = 'thumb-item'; item.dataset.page = i;
    const check = document.createElement('div'); check.className = 'thumb-check'; check.innerHTML = '✓';
    const thumbBox = document.createElement('div'); thumbBox.className = 'thumb-canvas';
    const canvas = document.createElement('canvas'); thumbBox.appendChild(canvas);
    const label = document.createElement('div'); label.className = 'thumb-label'; label.textContent = `P.${i}`;
    const numBadge = document.createElement('div'); numBadge.className = 'thumb-num'; numBadge.textContent = i;
    item.appendChild(check); item.appendChild(thumbBox); item.appendChild(label);
    wrapper.appendChild(item); wrapper.appendChild(numBadge); grid.appendChild(wrapper);
    item.addEventListener('click', () => toggleSplitPage(i, item));
    renderThumb(splitPdfDoc, i, canvas);
  }
}
function toggleSplitPage(page, el) {
  if (splitSelectedPages.has(page)) { splitSelectedPages.delete(page); el.classList.remove('selected'); }
  else { splitSelectedPages.add(page); el.classList.add('selected'); }
}
function selectAllPages() { document.querySelectorAll('#splitThumbGrid .thumb-item').forEach(el => { splitSelectedPages.add(parseInt(el.dataset.page)); el.classList.add('selected'); }); }
function clearPageSelection() { splitSelectedPages.clear(); document.querySelectorAll('#splitThumbGrid .thumb-item').forEach(el => el.classList.remove('selected')); }
async function downloadSelected() {
  if (!splitSelectedPages.size) { toast('ページを選択してください', 'error'); return; }
  const pages = [...splitSelectedPages].sort((a, b) => a - b);
  const rawName = (document.getElementById('visualFileName').value || '').trim();
  const baseName = splitFile ? splitFile.name.replace(/\.pdf$/i, '') : 'split';
  const fileName = rawName
    ? sanitizeFileName(rawName) + '.pdf'
    : `${baseName}_pages_${pages.join('-')}.pdf`;
  const { PDFDocument } = PDFLib;
  const src = await PDFDocument.load(splitPdfBytes);
  const out = await PDFDocument.create();
  const copied = await out.copyPages(src, pages.map(p => p - 1));
  copied.forEach(p => out.addPage(p));
  downloadBytes(await out.save(), fileName);
  toast('ダウンロード完了！', 'success');
}
async function doSplit() {
  if (!splitPdfDoc) { toast('ファイルを読み込んでください', 'error'); return; }
  const btn = document.getElementById('splitBtn');
  btn.disabled = true; btn.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> 処理中...';
  try {
    const mode = document.getElementById('splitMode').value;
    const { PDFDocument } = PDFLib;
    const src = await PDFDocument.load(splitPdfBytes);
    const total = src.getPageCount();
    if (mode === 'all') {
      const zip = new JSZip(), baseName = splitFile.name.replace(/\.pdf$/i, ''), digits = String(total).length;
      for (let i = 0; i < total; i++) {
        const doc = await PDFDocument.create();
        const [page] = await doc.copyPages(src, [i]); doc.addPage(page);
        zip.file(`${baseName}_page${String(i + 1).padStart(digits, '0')}.pdf`, await doc.save());
      }
      const zipBlob = await zip.generateAsync({ type: 'blob' });
      const url = URL.createObjectURL(zipBlob);
      const a = document.createElement('a'); a.href = url; a.download = `${baseName}_split.zip`;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 10000);
      toast(`${total}ページをZIPでダウンロードしました`, 'success');
    } else if (mode === 'range') {
      const range = document.getElementById('pageRange').value;
      const indices = parseRange(range, total);
      if (!indices.length) { toast('有効なページ範囲を入力してください', 'error'); btn.disabled = false; btn.innerHTML = '⬇ 分割＆ダウンロード'; return; }
      const rawName = (document.getElementById('rangeFileName').value || '').trim();
      const baseName = splitFile.name.replace(/\.pdf$/i, '');
      const fileName = rawName
        ? sanitizeFileName(rawName) + '.pdf'
        : `${baseName}_${range.replace(/\s/g, '')}.pdf`;
      const doc = await PDFDocument.create();
      const copied = await doc.copyPages(src, indices.map(p => p - 1));
      copied.forEach(p => doc.addPage(p));
      downloadBytes(await doc.save(), fileName);
      toast('分割完了！', 'success');
    } else if (mode === 'visual') { await downloadSelected(); }
  } catch (e) { toast('処理に失敗しました: ' + e.message, 'error'); }
  btn.disabled = false; btn.innerHTML = '⬇ 分割＆ダウンロード';
}
function sanitizeFileName(name) {
  return name.replace(/[\\/:*?"<>|]/g, '_').replace(/\s+/g, '_').slice(0, 100);
}
function parseRange(str, max) {
  const pages = new Set();
  str.split(',').forEach(part => {
    part = part.trim();
    if (part.includes('-')) { const [a, b] = part.split('-').map(Number); for (let i = a; i <= Math.min(b, max); i++) if (i >= 1) pages.add(i); }
    else { const n = parseInt(part); if (n >= 1 && n <= max) pages.add(n); }
  });
  return [...pages].sort((a, b) => a - b);
}

// ────────────────────────────────────────
// REORDER
// ────────────────────────────────────────
let reorderFile = null, reorderPdfDoc = null, reorderPdfBytes = null, reorderPageOrder = [];
const reorderDropzone = document.getElementById('reorderDropzone');
reorderDropzone.addEventListener('dragover', e => { e.preventDefault(); reorderDropzone.classList.add('drag-over'); });
reorderDropzone.addEventListener('dragleave', () => reorderDropzone.classList.remove('drag-over'));
reorderDropzone.addEventListener('drop', e => {
  e.preventDefault(); reorderDropzone.classList.remove('drag-over');
  const file = [...e.dataTransfer.files].find(f => f.name.endsWith('.pdf'));
  if (file) loadReorderFile(file);
});
document.getElementById('fileInputReorder').addEventListener('change', e => { if (e.target.files[0]) loadReorderFile(e.target.files[0]); e.target.value = ''; });
async function loadReorderFile(file) {
  reorderFile = file; reorderPdfBytes = await file.arrayBuffer();
  reorderPdfDoc = await pdfjsLib.getDocument({ data: reorderPdfBytes.slice() }).promise;
  reorderPageOrder = Array.from({ length: reorderPdfDoc.numPages }, (_, i) => i);
  document.getElementById('reorderPanel').style.display = 'block';
  renderReorderThumbs();
}
async function renderReorderThumbs() {
  const grid = document.getElementById('reorderThumbGrid'); grid.innerHTML = '';
  for (let pos = 0; pos < reorderPageOrder.length; pos++) {
    const origPage = reorderPageOrder[pos] + 1;
    const item = document.createElement('div'); item.className = 'thumb-item'; item.draggable = true; item.dataset.pos = pos;
    const thumbBox = document.createElement('div'); thumbBox.className = 'thumb-canvas';
    const canvas = document.createElement('canvas'); thumbBox.appendChild(canvas);
    const label = document.createElement('div'); label.className = 'thumb-label'; label.textContent = `P.${pos + 1}（元: ${origPage}）`;
    item.appendChild(thumbBox); item.appendChild(label); grid.appendChild(item);
    renderThumb(reorderPdfDoc, origPage, canvas); setupReorderDrag(item, pos);
  }
}
let dragSrcPos = null;
function setupReorderDrag(el, pos) {
  el.addEventListener('dragstart', e => { dragSrcPos = pos; e.dataTransfer.effectAllowed = 'move'; setTimeout(() => el.classList.add('dragging'), 0); });
  el.addEventListener('dragend', () => { el.classList.remove('dragging'); document.querySelectorAll('#reorderThumbGrid .thumb-item').forEach(t => t.classList.remove('drag-target')); });
  el.addEventListener('dragover', e => { e.preventDefault(); document.querySelectorAll('#reorderThumbGrid .thumb-item').forEach(t => t.classList.remove('drag-target')); el.classList.add('drag-target'); });
  el.addEventListener('dragleave', () => el.classList.remove('drag-target'));
  el.addEventListener('drop', e => {
    e.preventDefault(); el.classList.remove('drag-target');
    const from = dragSrcPos, to = parseInt(el.dataset.pos);
    if (from !== null && from !== to) { const tmp = reorderPageOrder.splice(from, 1)[0]; reorderPageOrder.splice(to, 0, tmp); renderReorderThumbs(); toast('ページを移動しました', 'info'); }
    dragSrcPos = null;
  });
}
function resetPageOrder() { if (!reorderPdfDoc) return; reorderPageOrder = Array.from({ length: reorderPdfDoc.numPages }, (_, i) => i); renderReorderThumbs(); toast('順序をリセットしました', 'info'); }
async function saveReordered() {
  if (!reorderPdfDoc) return;
  const { PDFDocument } = PDFLib;
  const src = await PDFDocument.load(reorderPdfBytes);
  const out = await PDFDocument.create();
  const copied = await out.copyPages(src, reorderPageOrder);
  copied.forEach(p => out.addPage(p));
  downloadBytes(await out.save(), reorderFile.name.replace('.pdf', '') + '_reordered.pdf');
  toast('保存してダウンロードしました！', 'success');
}

// ────────────────────────────────────────
// DRAW  ✏️
// ────────────────────────────────────────
let drawFile = null;
let drawPdfJsDoc = null;   // pdf.js (rendering)
let drawPdfBytes = null;   // raw bytes for pdf-lib
let drawCurrentPage = 1;
let drawTotalPages = 1;
let drawScale = 1.4;
let drawVp = null;         // current pdf.js viewport

// Drawing state
let currentTool = 'line';
let currentColor = '#e05a7a';
let currentStroke = 1.5;
let fillEnabled = false;

// Per-page shape storage: Map<pageNum, shape[]>
// shape = {type, color, stroke, fill, ...coords}
const pageShapes = new Map();

// Undo/redo stacks per page
const undoStacks = new Map(); // Map<pageNum, shape[][]>
const redoStacks = new Map();

// Polygon in-progress
let polygonPoints = [];
let isDrawing = false;
let startX, startY;

const pdfRenderCanvas = document.getElementById('pdfRenderCanvas');
const drawCanvas = document.getElementById('drawCanvas');
const ctx = drawCanvas.getContext('2d');
const snapDot = document.getElementById('snapDot');

// ── Drop zone ──
const drawDropzone = document.getElementById('drawDropzone');
drawDropzone.addEventListener('dragover', e => { e.preventDefault(); drawDropzone.classList.add('drag-over'); });
drawDropzone.addEventListener('dragleave', () => drawDropzone.classList.remove('drag-over'));
drawDropzone.addEventListener('drop', e => {
  e.preventDefault(); drawDropzone.classList.remove('drag-over');
  const file = [...e.dataTransfer.files].find(f => f.name.endsWith('.pdf'));
  if (file) loadDrawFile(file);
});
document.getElementById('fileInputDraw').addEventListener('change', e => { if (e.target.files[0]) loadDrawFile(e.target.files[0]); e.target.value = ''; });

async function loadDrawFile(file) {
  drawFile = file;
  drawPdfBytes = await file.arrayBuffer();
  drawPdfJsDoc = await pdfjsLib.getDocument({ data: drawPdfBytes.slice() }).promise;
  drawTotalPages = drawPdfJsDoc.numPages;
  drawCurrentPage = 1;
  document.getElementById('drawWorkspace').style.display = 'block';
  await renderDrawPage();
}

async function renderDrawPage() {
  drawVp = await renderPageToCanvas(drawPdfJsDoc, drawCurrentPage, pdfRenderCanvas, drawScale);
  drawCanvas.width = drawVp.width;
  drawCanvas.height = drawVp.height;
  document.getElementById('drawPageInfo').textContent = `${drawCurrentPage} / ${drawTotalPages}`;
  document.getElementById('drawPrevPage').disabled = drawCurrentPage <= 1;
  document.getElementById('drawNextPage').disabled = drawCurrentPage >= drawTotalPages;
  redrawAllShapes();
}

document.getElementById('drawPrevPage').addEventListener('click', async () => {
  if (drawCurrentPage > 1) { drawCurrentPage--; await renderDrawPage(); }
});
document.getElementById('drawNextPage').addEventListener('click', async () => {
  if (drawCurrentPage < drawTotalPages) { drawCurrentPage++; await renderDrawPage(); }
});

// ── Tool / color / stroke setters ──
function setTool(tool) {
  currentTool = tool;
  polygonPoints = []; isDrawing = false; snapDot.style.display = 'none';
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tool-' + tool).classList.add('active');
  drawCanvas.style.cursor = tool === 'polygon' ? 'crosshair' : 'crosshair';
}

function setColor(el) {
  currentColor = el.dataset.color;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('customColor').value = currentColor;
}

function setCustomColor(val) {
  currentColor = val;
  document.querySelectorAll('.swatch').forEach(s => s.classList.remove('active'));
}

function setStroke(w) {
  currentStroke = w;
  document.querySelectorAll('.stroke-btn').forEach(b => b.classList.remove('active'));
  const map = { 1.5: 'sw-1', 3: 'sw-2', 5: 'sw-3' };
  if (map[w]) document.getElementById(map[w]).classList.add('active');
}

function toggleFill() {
  fillEnabled = !fillEnabled;
  const btn = document.getElementById('fillToggle');
  btn.classList.toggle('active', fillEnabled);
  btn.innerHTML = fillEnabled
    ? `<svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> 塗りあり`
    : `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/></svg> 枠のみ`;
}

// ── Shapes storage helpers ──
function getShapes(page) {
  if (!pageShapes.has(page)) pageShapes.set(page, []);
  return pageShapes.get(page);
}
function pushShape(shape) {
  const shapes = getShapes(drawCurrentPage);
  // save undo snapshot
  if (!undoStacks.has(drawCurrentPage)) undoStacks.set(drawCurrentPage, []);
  undoStacks.get(drawCurrentPage).push([...shapes]);
  redoStacks.set(drawCurrentPage, []); // clear redo
  shapes.push(shape);
  redrawAllShapes();
}

function undoDraw() {
  const stack = undoStacks.get(drawCurrentPage);
  if (!stack || !stack.length) { toast('これ以上元に戻せません', 'info'); return; }
  const prev = stack.pop();
  if (!redoStacks.has(drawCurrentPage)) redoStacks.set(drawCurrentPage, []);
  redoStacks.get(drawCurrentPage).push([...getShapes(drawCurrentPage)]);
  pageShapes.set(drawCurrentPage, prev);
  redrawAllShapes();
}
function redoDraw() {
  const stack = redoStacks.get(drawCurrentPage);
  if (!stack || !stack.length) { toast('これ以上やり直せません', 'info'); return; }
  const next = stack.pop();
  if (!undoStacks.has(drawCurrentPage)) undoStacks.set(drawCurrentPage, []);
  undoStacks.get(drawCurrentPage).push([...getShapes(drawCurrentPage)]);
  pageShapes.set(drawCurrentPage, next);
  redrawAllShapes();
}
function clearDrawPage() {
  const shapes = getShapes(drawCurrentPage);
  if (!shapes.length) return;
  if (!undoStacks.has(drawCurrentPage)) undoStacks.set(drawCurrentPage, []);
  undoStacks.get(drawCurrentPage).push([...shapes]);
  redoStacks.set(drawCurrentPage, []);
  pageShapes.set(drawCurrentPage, []);
  polygonPoints = []; isDrawing = false; snapDot.style.display = 'none';
  redrawAllShapes();
  toast('このページの書き込みをクリアしました', 'info');
}

// keyboard shortcuts
document.addEventListener('keydown', e => {
  if (document.getElementById('panel-draw').classList.contains('active')) {
    if ((e.ctrlKey || e.metaKey) && e.key === 'z') { e.preventDefault(); undoDraw(); }
    if ((e.ctrlKey || e.metaKey) && (e.key === 'y' || (e.shiftKey && e.key === 'z'))) { e.preventDefault(); redoDraw(); }
  }
});

// ── Canvas drawing ──
function getCanvasPos(e) {
  const rect = drawCanvas.getBoundingClientRect();
  const scaleX = drawCanvas.width / rect.width;
  const scaleY = drawCanvas.height / rect.height;
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const clientY = e.touches ? e.touches[0].clientY : e.clientY;
  return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
}

const SNAP_DIST = 16; // px — distance to close polygon

function isNearStart(x, y) {
  if (polygonPoints.length < 3) return false;
  const dx = x - polygonPoints[0].x, dy = y - polygonPoints[0].y;
  return Math.sqrt(dx * dx + dy * dy) < SNAP_DIST;
}

drawCanvas.addEventListener('mousedown', onDrawStart);
drawCanvas.addEventListener('mousemove', onDrawMove);
drawCanvas.addEventListener('mouseup', onDrawEnd);
drawCanvas.addEventListener('touchstart', e => { e.preventDefault(); onDrawStart(e); }, { passive: false });
drawCanvas.addEventListener('touchmove', e => { e.preventDefault(); onDrawMove(e); }, { passive: false });
drawCanvas.addEventListener('touchend', e => { e.preventDefault(); onDrawEnd(e); }, { passive: false });

function onDrawStart(e) {
  const { x, y } = getCanvasPos(e);

  if (currentTool === 'polygon') {
    if (polygonPoints.length > 0 && isNearStart(x, y)) {
      // close polygon
      finishPolygon();
    } else {
      polygonPoints.push({ x, y });
      redrawAllShapes();
      drawPolygonInProgress();
    }
    return;
  }

  isDrawing = true;
  startX = x; startY = y;
}

function onDrawMove(e) {
  const { x, y } = getCanvasPos(e);

  if (currentTool === 'polygon') {
    // show snap indicator
    if (polygonPoints.length >= 3 && isNearStart(x, y)) {
      snapDot.style.display = 'block';
      const rect = drawCanvas.getBoundingClientRect();
      const px = polygonPoints[0].x * (rect.width / drawCanvas.width);
      const py = polygonPoints[0].y * (rect.height / drawCanvas.height);
      snapDot.style.left = px + 'px'; snapDot.style.top = py + 'px';
    } else {
      snapDot.style.display = 'none';
    }
    if (polygonPoints.length > 0) {
      redrawAllShapes();
      drawPolygonInProgress(x, y);
    }
    return;
  }

  if (!isDrawing) return;
  redrawAllShapes();
  drawPreview(startX, startY, x, y);
}

function onDrawEnd(e) {
  if (currentTool === 'polygon') return;
  if (!isDrawing) return;
  isDrawing = false;
  const { x, y } = e.type === 'touchend'
    ? { x: (e.changedTouches[0].clientX - drawCanvas.getBoundingClientRect().left) * (drawCanvas.width / drawCanvas.getBoundingClientRect().width), y: (e.changedTouches[0].clientY - drawCanvas.getBoundingClientRect().top) * (drawCanvas.height / drawCanvas.getBoundingClientRect().height) }
    : getCanvasPos(e);

  if (Math.abs(x - startX) < 2 && Math.abs(y - startY) < 2) return; // too small — ignore

  pushShape({
    type: currentTool, color: currentColor, stroke: currentStroke, fill: fillEnabled,
    x1: startX, y1: startY, x2: x, y2: y
  });
}

function finishPolygon() {
  if (polygonPoints.length < 3) { polygonPoints = []; redrawAllShapes(); return; }
  pushShape({
    type: 'polygon', color: currentColor, stroke: currentStroke, fill: fillEnabled,
    points: [...polygonPoints]
  });
  polygonPoints = [];
  snapDot.style.display = 'none';
}

// ── Rendering helpers ──
function redrawAllShapes() {
  ctx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
  const shapes = getShapes(drawCurrentPage);
  shapes.forEach(s => drawShape(ctx, s));
}

function drawPreview(x1, y1, x2, y2) {
  const s = { type: currentTool, color: currentColor, stroke: currentStroke, fill: fillEnabled, x1, y1, x2, y2 };
  drawShape(ctx, s);
}

function drawPolygonInProgress(mouseX, mouseY) {
  ctx.save();
  ctx.strokeStyle = currentColor;
  ctx.lineWidth = currentStroke;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.setLineDash([5, 4]);
  ctx.beginPath();
  ctx.moveTo(polygonPoints[0].x, polygonPoints[0].y);
  for (let i = 1; i < polygonPoints.length; i++) ctx.lineTo(polygonPoints[i].x, polygonPoints[i].y);
  if (mouseX !== undefined) ctx.lineTo(mouseX, mouseY);
  ctx.stroke();
  // dots at vertices
  polygonPoints.forEach((pt, i) => {
    ctx.beginPath();
    ctx.arc(pt.x, pt.y, i === 0 ? 5 : 3, 0, Math.PI * 2);
    ctx.fillStyle = i === 0 ? currentColor : currentColor + 'aa';
    ctx.fill();
  });
  ctx.restore();
}

function drawShape(ctx, s) {
  ctx.save();
  ctx.strokeStyle = s.color;
  ctx.lineWidth = s.stroke;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';
  ctx.setLineDash([]);

  const fillColor = s.color + '33'; // 20% opacity fill

  if (s.type === 'line') {
    ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();

  } else if (s.type === 'arrow') {
    const dx = s.x2 - s.x1, dy = s.y2 - s.y1;
    const len = Math.sqrt(dx * dx + dy * dy);
    if (len < 1) { ctx.restore(); return; }
    const ux = dx / len, uy = dy / len;
    const headLen = Math.max(12, s.stroke * 5);
    const angle = Math.PI / 7;
    ctx.beginPath(); ctx.moveTo(s.x1, s.y1); ctx.lineTo(s.x2, s.y2); ctx.stroke();
    // arrowhead
    ctx.beginPath();
    ctx.moveTo(s.x2, s.y2);
    ctx.lineTo(s.x2 - headLen * Math.cos(Math.atan2(dy, dx) - angle), s.y2 - headLen * Math.sin(Math.atan2(dy, dx) - angle));
    ctx.moveTo(s.x2, s.y2);
    ctx.lineTo(s.x2 - headLen * Math.cos(Math.atan2(dy, dx) + angle), s.y2 - headLen * Math.sin(Math.atan2(dy, dx) + angle));
    ctx.stroke();

  } else if (s.type === 'polygon') {
    if (!s.points || s.points.length < 2) { ctx.restore(); return; }
    ctx.beginPath();
    ctx.moveTo(s.points[0].x, s.points[0].y);
    s.points.forEach((pt, i) => { if (i > 0) ctx.lineTo(pt.x, pt.y); });
    ctx.closePath();
    if (s.fill) { ctx.fillStyle = fillColor; ctx.fill(); }
    ctx.stroke();

  } else if (s.type === 'rect') {
    const x = Math.min(s.x1, s.x2), y = Math.min(s.y1, s.y2);
    const w = Math.abs(s.x2 - s.x1), h = Math.abs(s.y2 - s.y1);
    if (s.fill) { ctx.fillStyle = fillColor; ctx.fillRect(x, y, w, h); }
    ctx.strokeRect(x, y, w, h);

  } else if (s.type === 'circle') {
    const cx = (s.x1 + s.x2) / 2, cy = (s.y1 + s.y2) / 2;
    const rx = Math.abs(s.x2 - s.x1) / 2, ry = Math.abs(s.y2 - s.y1) / 2;
    ctx.beginPath(); ctx.ellipse(cx, cy, Math.max(rx, 1), Math.max(ry, 1), 0, 0, Math.PI * 2);
    if (s.fill) { ctx.fillStyle = fillColor; ctx.fill(); }
    ctx.stroke();

  } else if (s.type === 'triangle') {
    const mx = (s.x1 + s.x2) / 2;
    ctx.beginPath(); ctx.moveTo(mx, s.y1); ctx.lineTo(s.x2, s.y2); ctx.lineTo(s.x1, s.y2); ctx.closePath();
    if (s.fill) { ctx.fillStyle = fillColor; ctx.fill(); }
    ctx.stroke();
  }

  ctx.restore();
}

// ── Save drawn PDF ──
async function saveDrawnPdf() {
  if (!drawFile) { toast('ファイルを読み込んでください', 'error'); return; }
  const btn = document.querySelector('#panel-draw .btn-success');
  btn.disabled = true; btn.innerHTML = '<span class="dots"><span></span><span></span><span></span></span> 書き出し中...';
  try {
    const { PDFDocument, rgb, LineCapStyle } = PDFLib;
    const pdfDoc = await PDFDocument.load(drawPdfBytes);

    for (const [pageNum, shapes] of pageShapes.entries()) {
      if (!shapes.length) continue;
      const page = pdfDoc.getPage(pageNum - 1);
      const { width: pdfW, height: pdfH } = page.getSize();

      // We rendered at drawScale; canvas size = pdfPt * drawScale
      const scaleX = pdfW / (drawVp ? drawVp.width / drawScale * drawScale : pdfW);
      const scaleY = pdfH / (drawVp ? drawVp.height / drawScale * drawScale : pdfH);

      // Re-render that page to get correct scale mapping
      const tmpCanvas = document.createElement('canvas');
      const tmpVp = await renderPageToCanvas(drawPdfJsDoc, pageNum, tmpCanvas, drawScale);
      const canvasW = tmpCanvas.width, canvasH = tmpCanvas.height;
      const sx = pdfW / canvasW, sy = pdfH / canvasH;

      const hexToRgb = hex => {
        const r = parseInt(hex.slice(1, 3), 16) / 255;
        const g = parseInt(hex.slice(3, 5), 16) / 255;
        const b = parseInt(hex.slice(5, 7), 16) / 255;
        return rgb(r, g, b);
      };

      for (const s of shapes) {
        const c = hexToRgb(s.color);
        const sw = s.stroke;
        const fillC = s.fill ? hexToRgb(s.color) : null;
        const fillOp = 0.2;

        // PDF coords: y is flipped
        const fy = v => pdfH - v * sy;
        const fx = v => v * sx;

        if (s.type === 'line') {
          page.drawLine({ start: { x: fx(s.x1), y: fy(s.y1) }, end: { x: fx(s.x2), y: fy(s.y2) }, thickness: sw, color: c, lineCap: LineCapStyle.Round });

        } else if (s.type === 'arrow') {
          page.drawLine({ start: { x: fx(s.x1), y: fy(s.y1) }, end: { x: fx(s.x2), y: fy(s.y2) }, thickness: sw, color: c, lineCap: LineCapStyle.Round });
          const dx = fx(s.x2) - fx(s.x1), dy = fy(s.y2) - fy(s.y1);
          const angle = Math.atan2(dy, dx);
          const headLen = Math.max(12, sw * 5);
          const spread = Math.PI / 7;
          page.drawLine({ start: { x: fx(s.x2), y: fy(s.y2) }, end: { x: fx(s.x2) - headLen * Math.cos(angle - spread), y: fy(s.y2) - headLen * Math.sin(angle - spread) }, thickness: sw, color: c });
          page.drawLine({ start: { x: fx(s.x2), y: fy(s.y2) }, end: { x: fx(s.x2) - headLen * Math.cos(angle + spread), y: fy(s.y2) - headLen * Math.sin(angle + spread) }, thickness: sw, color: c });

        } else if (s.type === 'rect') {
          const x = Math.min(fx(s.x1), fx(s.x2));
          const y = Math.min(fy(s.y1), fy(s.y2));
          const w = Math.abs(fx(s.x2) - fx(s.x1));
          const h = Math.abs(fy(s.y2) - fy(s.y1));
          if (fillC) page.drawRectangle({ x, y, width: w, height: h, color: fillC, opacity: fillOp });
          page.drawRectangle({ x, y, width: w, height: h, borderColor: c, borderWidth: sw, color: undefined });

        } else if (s.type === 'circle') {
          const cx = (fx(s.x1) + fx(s.x2)) / 2;
          const cy = (fy(s.y1) + fy(s.y2)) / 2;
          const rx = Math.abs(fx(s.x2) - fx(s.x1)) / 2;
          const ry = Math.abs(fy(s.y2) - fy(s.y1)) / 2;
          if (fillC) page.drawEllipse({ x: cx, y: cy, xScale: Math.max(rx, 1), yScale: Math.max(ry, 1), color: fillC, opacity: fillOp });
          page.drawEllipse({ x: cx, y: cy, xScale: Math.max(rx, 1), yScale: Math.max(ry, 1), borderColor: c, borderWidth: sw, color: undefined });

        } else if (s.type === 'triangle') {
          const mx = (fx(s.x1) + fx(s.x2)) / 2;
          const pts = [{ x: mx, y: fy(s.y1) }, { x: fx(s.x2), y: fy(s.y2) }, { x: fx(s.x1), y: fy(s.y2) }];
          drawPdfPolygon(page, pts, c, sw, fillC, fillOp);

        } else if (s.type === 'polygon') {
          const pts = s.points.map(p => ({ x: fx(p.x), y: fy(p.y) }));
          drawPdfPolygon(page, pts, c, sw, fillC, fillOp);
        }
      }
    }

    const outBytes = await pdfDoc.save();
    const name = drawFile.name.replace('.pdf', '') + '_annotated.pdf';
    downloadBytes(outBytes, name);
    toast('書き込み済みPDFを保存しました！', 'success');
  } catch (e) { toast('保存に失敗しました: ' + e.message, 'error'); console.error(e); }
  btn.disabled = false; btn.innerHTML = '⬇ 書き込み済みPDFを保存';
}

// pdf-lib doesn't have drawPolygon — draw as lines
function drawPdfPolygon(page, pts, color, thickness, fillColor, fillOpacity) {
  const { LineCapStyle } = PDFLib;
  for (let i = 0; i < pts.length; i++) {
    const a = pts[i], b = pts[(i + 1) % pts.length];
    page.drawLine({ start: a, end: b, thickness, color, lineCap: LineCapStyle.Round });
  }
}

// ── Shared download ──
function downloadBytes(bytes, filename) {
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a'); a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 10000);
}
</script>
